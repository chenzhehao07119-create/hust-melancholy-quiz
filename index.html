<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#090c10">
<title>华科最忧郁的人 · 闯关评测</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; touch-action: manipulation; overscroll-behavior: none; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: #090c10;
    color: #c9d1d9;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none; -webkit-user-select: none;
  }
  /* ---- Canvas 粒子背景 ---- */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .container { width: 100%; max-width: 500px; padding: 20px 16px; position: relative; z-index: 1; }

  /* ---- 封面 ---- */
  .cover { text-align: center; }
  .cover .mascot {
    font-size: 4.5rem; margin-bottom: 16px;
    animation: mascotFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px #58a6ff44);
  }
  @keyframes mascotFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    30% { transform: translateY(-12px) rotate(2deg); }
    60% { transform: translateY(-4px) rotate(-1deg); }
  }
  .cover h1 {
    font-size: 1.7rem; font-weight: 800;
    background: linear-gradient(135deg, #58a6ff, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px; letter-spacing: 2px;
  }
  .cover .subtitle {
    font-size: 0.9rem; color: #8b949e; margin-bottom: 6px;
  }
  .cover .hint {
    font-size: 0.78rem; color: #484f58; margin-bottom: 36px;
  }
  .cover .tag-row {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px;
  }
  .cover .tag {
    font-size: 0.72rem; padding: 4px 12px;
    border-radius: 20px; background: #161b22; border: 1px solid #21262d;
    color: #8b949e;
  }

  /* ---- 进度条 ---- */
  .progress-wrap { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .progress-track {
    flex: 1; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, #238636, #3fb950);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-num {
    font-size: 0.75rem; color: #8b949e; font-variant-numeric: tabular-nums; min-width: 32px; text-align: right;
  }

  /* ---- 卡片 ---- */
  .card {
    background: #0f131a;
    border: 1px solid #1c2128;
    border-radius: 16px;
    padding: 28px 22px 22px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #30363d66, transparent);
  }
  .stage-label {
    font-size: 0.72rem; letter-spacing: 2px; color: #58a6ff;
    margin-bottom: 10px; font-weight: 600;
  }
  .question {
    font-size: 1.1rem; line-height: 1.65; margin-bottom: 22px; color: #e6edf3;
    min-height: 2em;
  }

  /* ---- 选项 ---- */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: #131820;
    border: 1px solid #1c2128;
    border-radius: 10px;
    padding: 15px 16px;
    cursor: pointer;
    font-size: 0.95rem; color: #b0b8c1; text-align: left;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 50px;
    display: flex; align-items: center;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .option .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #21262d; margin-right: 12px; flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .option:active { transform: scale(0.985); }
  .option.selected {
    border-color: #58a6ff;
    background: #0d1a2d;
    color: #e6edf3;
  }
  .option.selected .dot {
    background: #58a6ff;
    box-shadow: 0 0 8px #58a6ff66;
  }
  @media (hover: hover) {
    .option:hover { border-color: #30363d; background: #161c26; }
    .option.selected:hover { border-color: #58a6ff; }
  }

  /* ---- 选项入场动画 ---- */
  .option.stagger-in {
    opacity: 0; transform: translateX(-16px);
    animation: staggerIn 0.35s ease-out forwards;
  }
  @keyframes staggerIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ---- 按钮 ---- */
  .btn {
    display: block; width: 100%; padding: 15px;
    border: none; border-radius: 10px; font-size: 1rem;
    cursor: pointer; font-weight: 600; letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; min-height: 50px;
    transition: all 0.2s ease;
  }
  .btn:active { transform: scale(0.975); }
  .btn-primary {
    background: linear-gradient(135deg, #238636, #2ea043);
    color: #fff;
  }
  .btn-primary:disabled {
    background: #161b22; color: #3a3f47; cursor: not-allowed;
    box-shadow: none;
  }
  .btn-primary:disabled:active { transform: none; }
  .btn-secondary {
    background: #161b22; color: #8b949e; border: 1px solid #21262d; margin-top: 8px;
  }
  .btn-share {
    background: linear-gradient(135deg, #1f6feb, #388bfd); color: #fff; margin-top: 8px;
  }
  @media (hover: hover) {
    .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 20px #23863644; }
    .btn-secondary:hover { background: #1c2128; }
    .btn-share:hover { box-shadow: 0 4px 20px #1f6feb44; }
  }

  /* ---- 抖动 ---- */
  .shake { animation: shake 0.5s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-6px); }
    30% { transform: translateX(6px); }
    45% { transform: translateX(-4px); }
    60% { transform: translateX(4px); }
    75% { transform: translateX(-2px); }
    90% { transform: translateX(2px); }
  }

  /* ---- 牌面翻转 ---- */
  .card.slide-in {
    animation: slideIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(40px) scale(0.97); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }
  .card.slide-out {
    animation: slideOut 0.3s cubic-bezier(0.55, 0, 1, 0.45) forwards;
  }
  @keyframes slideOut {
    to { opacity: 0; transform: translateX(-40px) scale(0.97); }
  }

  /* ---- 结果页 ---- */
  .result-page { text-align: center; }
  .result-emoji {
    font-size: 5rem; margin-bottom: 12px;
    animation: resultBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes resultBounce {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .result-title {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; line-height: 1.4;
    background: linear-gradient(135deg, #c9d1d9, #f0f6fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-sub {
    font-size: 0.9rem; color: #8b949e; line-height: 1.65; margin-bottom: 20px;
  }
  /* ---- 忧郁值仪表 ---- */
  .gauge-wrap { margin: 0 auto 20px; max-width: 280px; }
  .gauge-label {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: #484f58; margin-bottom: 6px;
  }
  .gauge-track {
    height: 14px; background: #161b22; border-radius: 7px; overflow: hidden;
    border: 1px solid #1c2128;
  }
  .gauge-fill {
    height: 100%; border-radius: 7px;
    background: linear-gradient(90deg, #3fb950, #d29922, #da3633, #a371f7);
    background-size: 300% 100%;
    transition: width 1.2s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .gauge-value {
    text-align: center; font-size: 2rem; font-weight: 800; margin-top: 4px;
    color: #c9d1d9;
    font-variant-numeric: tabular-nums;
  }

  /* ---- 维度条 ---- */
  .breakdown {
    text-align: left; padding: 0; margin-bottom: 20px;
  }
  .dim-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .dim-name {
    font-size: 0.78rem; color: #8b949e; width: 70px; flex-shrink: 0; text-align: right;
  }
  .dim-bar-wrap {
    flex: 1; height: 8px; background: #161b22; border-radius: 4px; overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%; border-radius: 4px;
    width: 0;
    transition: width 1s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .dim-score {
    font-size: 0.72rem; color: #484f58; width: 32px; flex-shrink: 0;
  }

  /* ---- 转场叠加 ---- */
  .transition-overlay {
    position: fixed; inset: 0; background: #090c10;
    z-index: 10; pointer-events: none; opacity: 0;
  }

  hr { border: none; border-top: 1px solid #1c2128; margin: 24px 0; }

  /* ---- 响应式 ---- */
  @media (max-width: 380px) {
    .cover h1 { font-size: 1.4rem; }
    .cover .mascot { font-size: 3.5rem; }
    .question { font-size: 1rem; }
    .option { padding: 13px 14px; font-size: 0.9rem; }
    .card { padding: 22px 16px 18px; }
    .result-emoji { font-size: 4rem; }
    .result-title { font-size: 1.15rem; }
    .gauge-value { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="container" id="app"></div>

<script>
// ===== 粒子背景 (Canvas) =====
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height; // 初始散布
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.size = Math.random() * 1.5 + 0.5;
    this.speed = Math.random() * 0.6 + 0.3;
    this.opacity = Math.random() * 0.35 + 0.1;
    this.wobble = Math.random() * 0.3;
    this.wobbleSpeed = Math.random() * 0.02 + 0.005;
    this.wobbleOffset = Math.random() * Math.PI * 2;
  }
  update() {
    this.y += this.speed;
    this.x += Math.sin(this.y * this.wobbleSpeed + this.wobbleOffset) * this.wobble;
    if (this.y > canvas.height + 10) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(88, 166, 255, ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 70; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===== 关卡数据 =====
const STAGES = [
  {
    title: '第一关 · 清晨',
    question: '早上八点的课，你睁开眼看到手机时间是 7:58，你的反应是？',
    options: [
      { text: '翻身继续睡，反正去了也听不懂', score: 4 },
      { text: '以最快速度洗漱冲出宿舍，跑向教室', score: 0 },
      { text: '打开雨课堂，发现老师还没开直播', score: 2 },
      { text: '醒了但不想动，盯着天花板发呆十分钟', score: 5 },
    ]
  },
  {
    title: '第二关 · 食堂',
    question: '你在韵苑食堂打饭，阿姨给你舀了一勺菜，你看着那勺菜，心里想的是？',
    options: [
      { text: '谢谢阿姨！', score: 0 },
      { text: '这勺菜的分量和人生的希望差不多', score: 5 },
      { text: '默默拍张照发朋友圈：「这就是985的伙食吗」', score: 2 },
      { text: '低头吃完，一句话不说，像完成某种仪式', score: 4 },
    ]
  },
  {
    title: '第三关 · 课堂',
    question: '老师在讲台上激情四射，你在台下——',
    options: [
      { text: '认真记笔记，积极互动', score: 0 },
      { text: '刷着手机，每隔五分钟抬头假装思考', score: 2 },
      { text: '盯着PPT上的公式，感觉它们也在盯着你', score: 4 },
      { text: '在想「我到底为什么要学这个专业」', score: 5 },
    ]
  },
  {
    title: '第四关 · 社交',
    question: '室友问你周末要不要一起出去吃饭，你——',
    options: [
      { text: '好啊！去哪吃？', score: 0 },
      { text: '嘴上答应，其实已经在想借口推掉了', score: 3 },
      { text: '说不去了，然后在宿舍独自点外卖刷B站', score: 4 },
      { text: '说不去了，理由是「我要写作业」，但其实只是在床上躺着', score: 5 },
    ]
  },
  {
    title: '第五关 · 深夜',
    question: '凌晨一点，你躺在床上，脑海中反复回荡的是？',
    options: [
      { text: '明天要交的作业还没写', score: 1 },
      { text: '大二了还没谈过恋爱，是不是要孤独终老', score: 3 },
      { text: '高考完以为解放了，结果发现人生才刚入狱', score: 4 },
      { text: '以上全部，轮番播放，直到凌晨三点', score: 5 },
    ]
  },
  {
    title: '第六关 · 未来',
    question: '想到「未来」两个字，你的第一反应是？',
    options: [
      { text: '充满期待，已经在做规划了', score: 0 },
      { text: '考研、出国、工作，每条路都看不清', score: 3 },
      { text: '算了，先把这个学期的课苟过去再说', score: 4 },
      { text: '脑子里一片空白，像华科冬天的梧桐树', score: 5 },
    ]
  },
  {
    title: '第七关 · 终极',
    question: '如果现在有人对你说「你好像不太开心」，你会？',
    options: [
      { text: '笑着说「没有啊，我挺好的」', score: 1 },
      { text: '愣住了，因为很久没人这么问过了', score: 3 },
      { text: '眼眶突然有点酸，但还是说了句「没事」', score: 5 },
      { text: '沉默很久，然后说「习惯了」', score: 5 },
    ]
  },
];

// ===== 状态 =====
let currentStage = -1;
let answers = [];
let direction = 1; // 1=前进, -1=后退

const app = document.getElementById('app');

// ===== 工具函数 =====
function haptic() {
  if (navigator.vibrate) navigator.vibrate(10);
}

// ===== 封面 =====
function renderCover() {
  return `
    <div class="cover">
      <div class="mascot">🌧️</div>
      <h1>华科最忧郁的人</h1>
      <p class="subtitle">闯关评测</p>
      <div class="tag-row">
        <span class="tag">7 道关卡</span>
        <span class="tag">7 个维度</span>
        <span class="tag">1037 号森林认证</span>
      </div>
      <p class="hint">测测你的忧郁浓度，看看谁才是华科最忧郁的人</p>
    </div>
    <button class="btn btn-primary" id="startBtn">开始评测</button>
  `;
}

// ===== 进度条 =====
function renderProgress() {
  const done = currentStage < 0 ? 0 : currentStage;
  const pct = Math.round((done / STAGES.length) * 100);
  return `
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-num">${done}/${STAGES.length}</div>
    </div>
  `;
}

// ===== 关卡 =====
function renderStage() {
  const s = STAGES[currentStage];
  const selected = answers[currentStage];
  const cls = direction > 0 ? 'slide-in' : 'slide-out';
  return `
    ${renderProgress()}
    <div class="card ${cls}" id="stageCard">
      <div class="stage-label">${s.title}</div>
      <div class="question">${s.question}</div>
      <div class="options">
        ${s.options.map((o, i) => `
          <button class="option stagger-in${selected === i ? ' selected' : ''}"
            data-index="${i}" style="animation-delay:${i * 0.06}s">
            <span class="dot"></span>${o.text}
          </button>
        `).join('')}
      </div>
    </div>
    <button class="btn btn-primary" id="nextBtn" ${selected === undefined ? 'disabled' : ''}>
      ${currentStage === STAGES.length - 1 ? '🔮 揭晓结果' : '下一关 →'}
    </button>
    ${currentStage > 0 ? `<button class="btn btn-secondary" id="prevBtn">← 返回上一关</button>` : ''}
  `;
}

// ===== 结果页 =====
function renderResult() {
  const total = answers.reduce((sum, idx, i) => sum + STAGES[i].options[idx].score, 0);
  const max = STAGES.reduce((s, st) => s + Math.max(...st.options.map(o => o.score)), 0);
  const pct = Math.round((total / max) * 100);

  const tiers = [
    { icon: '☀️', title: '你不是华科人吧？', sub: '精神面貌太过积极向上，严重不符合华科气质。建议去隔壁珞珈山，那里更适合你。', min: 0 },
    { icon: '⛅', title: '华科轻度忧郁路人', sub: '偶尔emo，但总体阳光。在华科这个内卷丛林中保持这样的心态实属不易——你不是最忧郁的人，你是最让人羡慕的人。', min: 20 },
    { icon: '🌥️', title: '华科普通忧郁居民', sub: '有忧郁的时刻，但也知道怎么调节。你是1037号森林里最正常的那类人——不算快乐，但还撑得住。', min: 45 },
    { icon: '☁️', title: '华科重度忧郁选手', sub: '离「最忧郁」只差一步。你常在深夜思考人生意义，但白天还能勉强笑着活下去。继续努力（不是）。', min: 70 },
    { icon: '🌧️', title: '🏆 你就是华科最忧郁的人！', sub: '忧郁深邃如青年园的池水，绵长如梧桐大道。你把华科人的内耗、迷茫与沉默演绎到了极致。这不是失败，这是一种境界。', min: 90 },
  ];
  const tier = tiers.reverse().find(t => pct >= t.min) || tiers[0];

  const dims = [
    { name: '起床困难度', stages: [0], color: '#3fb950' },
    { name: '食堂哲学度', stages: [1], color: '#d29922' },
    { name: '课堂虚无度', stages: [2], color: '#da3633' },
    { name: '社交逃避度', stages: [3], color: '#a371f7' },
    { name: '深夜内耗度', stages: [4], color: '#58a6ff' },
    { name: '未来迷茫度', stages: [5], color: '#f778ba' },
    { name: '情感封闭度', stages: [6], color: '#7ee787' },
  ];

  return `
    ${renderProgress()}
    <div class="card result-page">
      <div class="result-emoji" id="resultEmoji">${tier.icon}</div>
      <div class="result-title">${tier.title}</div>
      <div class="gauge-wrap">
        <div class="gauge-label"><span>阳光开朗</span><span>极致忧郁</span></div>
        <div class="gauge-track">
          <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
        </div>
        <div class="gauge-value" id="gaugeValue">0%</div>
      </div>
      <div class="result-sub">${tier.sub}</div>
      <hr>
      <div class="breakdown">
        ${dims.map(d => {
          const dimScore = d.stages.reduce((s, si) => s + STAGES[si].options[answers[si]].score, 0);
          const dimMax = d.stages.reduce((s, si) => s + Math.max(...STAGES[si].options.map(o => o.score)), 0);
          return `
            <div class="dim-row">
              <span class="dim-name">${d.name}</span>
              <div class="dim-bar-wrap">
                <div class="dim-bar-fill" data-pct="${Math.round((dimScore/dimMax)*100)}"
                  style="background:${d.color}"></div>
              </div>
              <span class="dim-score">${dimScore}/${dimMax}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
    <button class="btn btn-primary" id="restartBtn">再来一次</button>
    <button class="btn btn-share" id="shareBtn">📤 分享结果</button>
    <div style="display:none" id="resultData" data-pct="${pct}" data-total="${total}" data-max="${max}"></div>
  `;
}

// ===== 渲染入口 =====
function render() {
  if (currentStage < 0) {
    app.innerHTML = renderCover();
    document.getElementById('startBtn').onclick = () => {
      haptic();
      currentStage = 0; direction = 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  } else if (currentStage >= STAGES.length) {
    app.innerHTML = renderResult();
    // 动画：仪表填充
    requestAnimationFrame(() => {
      const pct = parseInt(document.getElementById('resultData').dataset.pct);
      const fill = document.getElementById('gaugeFill');
      const val = document.getElementById('gaugeValue');
      // 数值滚动
      let c = 0;
      const dur = 1000; const step = 16;
      const inc = pct / (dur / step);
      const timer = setInterval(() => {
        c = Math.min(c + inc, pct);
        val.textContent = Math.round(c) + '%';
        if (c >= pct) clearInterval(timer);
      }, step);
      // 仪表条
      setTimeout(() => { fill.style.width = pct + '%'; }, 200);
      // 维度条
      setTimeout(() => {
        document.querySelectorAll('.dim-bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 500);
    });
    document.getElementById('restartBtn').onclick = restart;
    document.getElementById('shareBtn').onclick = shareResult;
  } else {
    app.innerHTML = renderStage();
    bindStageEvents();
  }
}

// ===== 关卡事件 =====
function bindStageEvents() {
  const card = document.getElementById('stageCard');

  document.querySelectorAll('.option').forEach(btn => {
    btn.onclick = function () {
      haptic();
      answers[currentStage] = parseInt(this.dataset.index);
      // 即时高亮不用整页重绘
      document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
      this.classList.add('selected');
      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn) nextBtn.disabled = false;
    };
  });

  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    nextBtn.onclick = () => {
      if (answers[currentStage] === undefined) {
        card.classList.add('shake');
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
        setTimeout(() => card.classList.remove('shake'), 500);
        return;
      }
      haptic();
      direction = 1;
      if (currentStage < STAGES.length - 1) {
        currentStage++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        currentStage = STAGES.length;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };
  }

  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) {
    prevBtn.onclick = () => {
      haptic();
      direction = -1;
      currentStage--;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
  }
}

// ===== 分享 =====
function shareResult() {
  const pct = document.getElementById('resultData').dataset.pct;
  const tiers = ['☀️ 你不是华科人吧？','⛅ 轻度忧郁路人','🌥️ 普通忧郁居民','☁️ 重度忧郁选手','🌧️ 华科最忧郁的人！'];
  const i = pct >= 90 ? 4 : pct >= 70 ? 3 : pct >= 45 ? 2 : pct >= 20 ? 1 : 0;
  const text = `【华科最忧郁的人·闯关评测】\n${tiers[i]}\n忧郁指数：${pct}%\n你也来测测 👇`;

  if (navigator.share) {
    navigator.share({ title: '华科最忧郁的人·闯关评测', text, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + ' ' + location.href).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✅ 已复制链接！';
      btn.style.background = 'linear-gradient(135deg, #238636, #2ea043)';
      setTimeout(() => {
        btn.textContent = '📤 分享结果';
        btn.style.background = 'linear-gradient(135deg, #1f6feb, #388bfd)';
      }, 2000);
    }).catch(() => {});
  }
}

function restart() {
  currentStage = -1; answers = []; direction = 1;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 启动
render();
</script>
</body>
</html>
