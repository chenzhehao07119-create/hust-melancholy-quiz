<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华科计院找爱情</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0, #ffccbc, #ffe0b2, #e8eaf6, #fce4ec);
  background-size: 400% 400%;
  animation: bgShift 20s ease infinite;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
  user-select: none; overflow-x: hidden;
}

@keyframes bgShift {
  0% { background-position: 0% 50%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}

/* Particle Background */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Main Container */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 720px; min-height: 100vh;
  padding: 12px;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.72); backdrop-filter: blur(24px);
  border: 1px solid rgba(233,30,99,0.15);
  box-shadow: 0 4px 30px rgba(255,138,128,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
  border-radius: 20px; padding: 20px 24px; margin-bottom: 10px;
  animation: fadeIn 0.5s cubic-bezier(0.4,0,0.2,1);
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes glow {
  0%,100% { box-shadow: 0 0 8px rgba(233,30,99,0.3); }
  50% { box-shadow: 0 0 25px rgba(255,107,138,0.6); }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

/* Title */
.game-title {
  text-align: center; font-size: 1.8rem; font-weight: 900;
  background: linear-gradient(135deg, #e91e63, #ff6f00, #e91e63);
  background-size: 200% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: 4px; margin-bottom: 4px;
  animation: shimmer 3s linear infinite;
}
.subtitle { text-align: center; color: #b0826a; font-size: 0.85rem; margin-bottom: 12px; }

/* Top Bar */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.top-tag {
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  color: #c2185b; padding: 5px 14px;
  border-radius: 20px; font-size: 0.8rem; font-weight: 600;
  border: 1px solid rgba(233,30,99,0.2);
}
.top-stat {
  color: #6d4c41; font-size: 0.85rem; font-weight: 500;
}
.top-stat span { color: #e91e63; font-weight: 700; }

/* Stat Bars */
.stat-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px;
}
.stat-item { margin: 2px 0; }
.stat-label {
  display: flex; justify-content: space-between;
  color: #795548; font-size: 0.75rem; margin-bottom: 3px; font-weight: 500;
}
.stat-label span:last-child { color: #e91e63; font-weight: 700; }
.stat-bar-bg {
  height: 8px; background: rgba(233,30,99,0.08); border-radius: 4px;
  overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
}
.stat-bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px currentColor;
}
.fill-coding { background: linear-gradient(90deg, #42a5f5, #7c4dff); box-shadow: 0 0 10px rgba(66,165,245,0.5); }
.fill-social { background: linear-gradient(90deg, #66bb6a, #26a69a); box-shadow: 0 0 10px rgba(102,187,106,0.5); }
.fill-appearance { background: linear-gradient(90deg, #ec407a, #ff7043); box-shadow: 0 0 10px rgba(236,64,122,0.5); }
.fill-romance { background: linear-gradient(90deg, #ef5350, #ff6d00); box-shadow: 0 0 10px rgba(239,83,80,0.5); }
.fill-gpa { background: linear-gradient(90deg, #ab47bc, #5c6bc0); box-shadow: 0 0 10px rgba(171,71,188,0.5); }

/* Character Affection */
.char-row { display: flex; gap: 8px; flex-wrap: wrap; }
.char-tag {
  flex: 1; min-width: 120px;
  background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(252,228,236,0.5));
  border-radius: 14px; padding: 10px 14px;
  border: 1px solid rgba(233,30,99,0.12);
  transition: all 0.3s; box-shadow: 0 2px 8px rgba(255,138,128,0.1);
}
.char-tag:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,138,128,0.2); }
.char-tag.locked { opacity: 0.45; filter: grayscale(0.3); }
.char-name { color: #4e342e; font-size: 0.82rem; font-weight: 700; }
.char-stage { color: #b0826a; font-size: 0.7rem; }
.char-hearts { color: #e91e63; font-size: 0.75rem; margin-top: 3px; }
.char-bar-bg {
  height: 4px; background: rgba(233,30,99,0.08); border-radius: 2px; margin-top: 4px;
}
.char-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #f48fb1, #e91e63, #ff6f00);
  border-radius: 2px; transition: width 0.5s ease;
  box-shadow: 0 0 6px rgba(233,30,99,0.4);
}

/* Narrative */
.narrative {
  min-height: 100px; max-height: 250px; overflow-y: auto;
  color: #5d4037; font-size: 0.9rem; line-height: 1.8;
  padding: 10px 4px;
}
.narrative p { margin-bottom: 4px; }
.narrative .highlight { color: #e91e63; font-weight: 600; }
.narrative .name-tag { color: #7c4dff; font-weight: 600; }
.narrative::-webkit-scrollbar { width: 5px; }
.narrative::-webkit-scrollbar-thumb { background: rgba(233,30,99,0.2); border-radius: 3px; }
.narrative::-webkit-scrollbar-track { background: rgba(233,30,99,0.04); border-radius: 3px; }

/* Action Buttons */
.actions-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.btn {
  padding: 11px 8px;
  border: 1px solid rgba(233,30,99,0.18);
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(252,228,236,0.7));
  color: #5d4037; font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.25s;
  text-align: center; font-family: inherit;
  box-shadow: 0 1px 4px rgba(255,138,128,0.1);
}
.btn:hover {
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  border-color: #e91e63; color: #c2185b;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(233,30,99,0.25);
}
.btn:active { transform: scale(0.96); }
.btn.primary {
  background: linear-gradient(135deg, #e91e63, #ff6f00);
  color: #fff; border: none; font-weight: 700;
  box-shadow: 0 4px 15px rgba(233,30,99,0.35);
}
.btn.primary:hover {
  background: linear-gradient(135deg, #f06292, #ff8f00);
  box-shadow: 0 6px 25px rgba(233,30,99,0.5);
}
.btn.danger {
  background: linear-gradient(135deg, #fff, #ffebee);
  border-color: #e91e63; color: #e91e63;
}
.btn.small { padding: 6px 12px; font-size: 0.72rem; border-radius: 8px; }

/* Overlay */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(30,10,20,0.6); backdrop-filter: blur(4px);
  z-index: 100; display: flex; justify-content: center; align-items: center;
  animation: fadeIn 0.3s ease;
}
.overlay-card {
  background: linear-gradient(135deg, #fff, #fce4ec);
  border: 1px solid rgba(233,30,99,0.2);
  border-radius: 20px; padding: 28px 24px; max-width: 500px; width: 90%;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 12px 50px rgba(233,30,99,0.2);
}
.overlay-title {
  font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(135deg, #e91e63, #ff6f00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-align: center; margin-bottom: 16px;
}
.overlay-text { color: #5d4037; font-size: 0.9rem; line-height: 1.8; margin-bottom: 16px; }
.choice-btn {
  display: block; width: 100%; padding: 14px 18px; margin: 8px 0;
  border: 1px solid rgba(233,30,99,0.15); border-radius: 14px;
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(252,228,236,0.5));
  color: #5d4037; font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all 0.25s; text-align: left; font-family: inherit;
  box-shadow: 0 1px 4px rgba(255,138,128,0.08);
}
.choice-btn:hover {
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  border-color: #e91e63; color: #c2185b;
  transform: translateX(4px);
  box-shadow: 0 4px 16px rgba(233,30,99,0.2);
}

/* Mini-game */
.minigame-area { text-align: center; padding: 16px; }
.minigame-timer { color: #e91e63; font-size: 1.3rem; font-weight: 700; }
.minigame-target {
  background: linear-gradient(135deg, #fff3e0, #fce4ec);
  border: 1px solid rgba(233,30,99,0.2); border-radius: 12px;
  padding: 14px; margin: 8px 0; color: #4e342e;
  font-size: 0.9rem; font-family: 'Courier New', monospace;
}
.bug-btn {
  display: inline-block; padding: 10px 22px; margin: 4px;
  border: 1px solid rgba(233,30,99,0.2); border-radius: 10px;
  background: linear-gradient(135deg, #fff, #fce4ec);
  color: #c2185b; cursor: pointer; font-size: 0.85rem;
  font-family: 'Courier New', monospace; transition: all 0.2s;
}
.bug-btn:hover { background: #fce4ec; border-color: #e91e63; transform: scale(1.03); }
.bug-btn.correct { background: #e8f5e9; color: #2e7d32; border-color: #66bb6a; }

/* Ending */
.ending-card { text-align: center; }
.ending-icon { font-size: 4.5rem; margin: 16px 0; animation: float 3s ease-in-out infinite; }
.ending-title {
  font-size: 1.5rem; font-weight: 700;
  background: linear-gradient(135deg, #e91e63, #ff6f00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin: 8px 0;
}
.ending-desc { color: #5d4037; font-size: 0.9rem; line-height: 1.8; margin: 12px 0; }
.ending-stats { color: #8d6e63; font-size: 0.8rem; margin: 12px 0; }

/* Achievements */
.ach-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.ach-item {
  background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(252,228,236,0.4));
  border-radius: 12px; padding: 10px 14px;
  border: 1px solid rgba(233,30,99,0.1); font-size: 0.75rem;
  color: #8d6e63; display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
}
.ach-item.unlocked {
  color: #e65100; border-color: rgba(255,111,0,0.3);
  background: linear-gradient(135deg, #fff8e1, #fce4ec);
  box-shadow: 0 2px 10px rgba(255,111,0,0.15);
}
.ach-icon { font-size: 1.3rem; }

/* Title screen */
.title-screen { text-align: center; padding: 48px 24px; }
.title-screen .game-title { font-size: 2.4rem; margin-bottom: 8px; }
.title-btns { display: flex; flex-direction: column; gap: 10px; max-width: 280px; margin: 28px auto; }
.title-btns .btn { padding: 16px; font-size: 1rem; }

/* Responsive */
@media (max-width: 500px) {
  .game-title { font-size: 1.4rem; }
  .actions-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-row { grid-template-columns: 1fr; }
  .char-tag { min-width: 100%; }
  .title-screen .game-title { font-size: 1.8rem; }
}

#typeInput:focus { border-color: #e91e63; box-shadow: 0 0 12px rgba(233,30,99,0.2); }

.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }

/* ── Sound Toggle ── */
.sound-toggle {
  position: fixed; top: 12px; right: 12px; z-index: 200;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
  border: 1px solid rgba(233,30,99,0.2);
  font-size: 20px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: all 0.2s;
}
.sound-toggle:active { transform: scale(0.9); }

/* ── Character Portrait ── */
.char-portrait {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; border-radius: 16px; margin-bottom: 12px;
  animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1);
  border: 2px solid transparent;
}
.char-portrait.lin {
  background: linear-gradient(135deg, #e8eaf6, #ede7f6);
  border-color: rgba(124,77,255,0.3);
  box-shadow: 0 4px 20px rgba(124,77,255,0.15);
}
.char-portrait.su {
  background: linear-gradient(135deg, #fff3e0, #fbe9e7);
  border-color: rgba(255,111,0,0.3);
  box-shadow: 0 4px 20px rgba(255,111,0,0.15);
}
.char-portrait.lu {
  background: linear-gradient(135deg, #fce4ec, #f3e5f5);
  border-color: rgba(233,30,99,0.3);
  box-shadow: 0 4px 20px rgba(233,30,99,0.15);
}
.char-portrait.ye {
  background: linear-gradient(135deg, #e0f2f1, #e8f5e9);
  border-color: rgba(38,166,154,0.3);
  box-shadow: 0 4px 20px rgba(38,166,154,0.15);
}
.char-portrait-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; flex-shrink: 0;
  animation: float 3s ease-in-out infinite;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.portrait-lin .char-portrait-avatar { background: linear-gradient(135deg, #7c4dff, #b388ff); }
.portrait-su .char-portrait-avatar { background: linear-gradient(135deg, #ff6f00, #ffab40); }
.portrait-lu .char-portrait-avatar { background: linear-gradient(135deg, #e91e63, #f48fb1); }
.portrait-ye .char-portrait-avatar { background: linear-gradient(135deg, #26a69a, #80cbc4); }
.char-portrait-info { flex: 1; min-width: 0; }
.char-portrait-name { font-size: 1rem; font-weight: 700; color: #4e342e; }
.char-portrait-title { font-size: 0.75rem; color: #8d6e63; margin-top: 2px; }
.char-portrait-affection {
  font-size: 0.78rem; color: #e91e63; margin-top: 4px; font-weight: 500;
}

/* ── Scene Card ── */
.scene-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(252,228,236,0.6));
  border: 1px solid rgba(233,30,99,0.15);
  border-radius: 16px; padding: 20px; margin: 12px 0;
  animation: sceneIn 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 8px 30px rgba(233,30,99,0.1);
}
@keyframes sceneIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.scene-title {
  font-size: 1.1rem; font-weight: 700; color: #e91e63;
  text-align: center; margin-bottom: 12px;
}
.scene-text {
  color: #5d4037; font-size: 0.9rem; line-height: 1.8;
  text-align: center; margin-bottom: 16px;
}
.scene-choices { display: flex; flex-direction: column; gap: 8px; }

/* ── Float Animation for Affection ── */
.affection-float {
  position: fixed; pointer-events: none; z-index: 300;
  font-weight: 700; font-size: 1rem;
  animation: affectionRise 1.5s ease-out forwards;
}
@keyframes affectionRise {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* ── Full Screen Hearts ── */
.heart-rain {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 250;
}
.heart-drop {
  position: absolute;
  font-size: var(--hs);
  animation: heartFall var(--hd) linear forwards;
  animation-delay: var(--hdel);
  top: -40px;
}
@keyframes heartFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  80% { opacity: 0.8; }
  100% { transform: translateY(105vh) rotate(var(--hr)); opacity: 0; }
}

/* ── Mini-game Enhance ── */
.minigame-card {
  background: linear-gradient(135deg, #fff, #fce4ec);
  border: 2px solid rgba(233,30,99,0.2);
  border-radius: 20px; padding: 24px; text-align: center;
  box-shadow: 0 8px 40px rgba(233,30,99,0.15);
  animation: sceneIn 0.5s cubic-bezier(0.4,0,0.2,1);
}
.minigame-heart {
  display: inline-block; font-size: 3rem;
  animation: heartBeat 0.6s ease-in-out infinite;
}
@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  30% { transform: scale(1.2); }
}
.minigame-timer-ring {
  width: 60px; height: 60px; border-radius: 50%;
  border: 4px solid rgba(233,30,99,0.15);
  border-top-color: #e91e63;
  margin: 8px auto;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: #e91e63;
}

/* ── Toast Notification ── */
.game-toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(30,10,20,0.85); color: #fff;
  padding: 10px 22px; border-radius: 24px;
  font-size: 0.85rem; font-weight: 500; z-index: 300;
  pointer-events: none;
  animation: toastAnim 1.8s ease-out forwards;
}
@keyframes toastAnim {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  75% { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
}

/* ── Narrative highlight per character ── */
.narr-lin { border-left: 3px solid #7c4dff; padding-left: 10px; }
.narr-su { border-left: 3px solid #ff6f00; padding-left: 10px; }
.narr-lu { border-left: 3px solid #e91e63; padding-left: 10px; }
.narr-ye { border-left: 3px solid #26a69a; padding-left: 10px; }

/* ── Personality Badges ── */
.personality-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
.personality-badge {
  padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 500;
  background: rgba(255,255,255,0.6); border: 1px solid rgba(233,30,99,0.15); color: #8d6e63;
}
.personality-badge.active { background: linear-gradient(135deg, #fce4ec, #f8bbd0); color: #c2185b; border-color: #e91e63; font-weight: 700; }

/* ── Recap / Review ── */
.review-header {
  text-align: center; padding: 20px 0;
  background: linear-gradient(135deg, #1a0533, #2d1b4e);
  border-radius: 16px; color: #fff; margin-bottom: 12px;
}
.review-score {
  font-size: 3.5rem; font-weight: 900;
  background: linear-gradient(135deg, #ffd54f, #ff8f00, #ff6f00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.review-rank {
  font-size: 1.2rem; font-weight: 700; color: #ffd54f; margin-top: 4px;
}
.review-subtitle { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 4px; }

.timeline-container { position: relative; padding-left: 24px; }
.timeline-container::before {
  content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 3px; background: linear-gradient(180deg, #e91e63, #ff6f00, #7c4dff, #26a69a);
  border-radius: 2px;
}
.timeline-item {
  position: relative; margin-bottom: 14px; padding: 10px 14px;
  background: rgba(255,255,255,0.75); border-radius: 10px;
  border: 1px solid rgba(233,30,99,0.1);
}
.timeline-item::before {
  content: ''; position: absolute; left: -20px; top: 14px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #e91e63; border: 2px solid #fff; box-shadow: 0 0 6px rgba(233,30,99,0.4);
}
.timeline-item.love::before { background: #e91e63; }
.timeline-item.study::before { background: #7c4dff; }
.timeline-item.social::before { background: #26a69a; }
.timeline-item.dilemma::before { background: #ff6f00; }
.timeline-sem { font-size: 0.7rem; color: #e91e63; font-weight: 700; }
.timeline-text { font-size: 0.82rem; color: #5d4037; margin-top: 2px; line-height: 1.5; }

.whatif-card {
  background: linear-gradient(135deg, #fff8e1, #fce4ec);
  border: 1px solid rgba(255,111,0,0.2); border-radius: 12px;
  padding: 12px 16px; margin: 8px 0; font-size: 0.82rem; color: #5d4037;
}

.stats-compare {

<script>
// ═══════════════════════════════════════════
// AUDIO SYSTEM — Web Audio API, no external files
// ═══════════════════════════════════════════
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol) {
  if (!soundEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxClick() { initAudio(); playTone(800, 0.04, 'sine', 0.06); }
function sfxSuccess() { initAudio(); playTone(523, 0.08, 'sine', 0.07); setTimeout(()=>playTone(659, 0.08, 'sine', 0.07), 80); setTimeout(()=>playTone(784, 0.12, 'sine', 0.08), 160); }
function sfxHeart() { initAudio(); playTone(440, 0.18, 'sine', 0.06); setTimeout(()=>playTone(554, 0.2, 'sine', 0.06), 120); }
function sfxFail() { initAudio(); playTone(200, 0.25, 'triangle', 0.05); }
function sfxEvent() { initAudio(); playTone(660, 0.06, 'sine', 0.05); setTimeout(()=>playTone(880, 0.08, 'sine', 0.05), 60); }
function sfxConfession() { initAudio(); playTone(392, 0.15, 'sine', 0.06); setTimeout(()=>playTone(523, 0.15, 'sine', 0.06), 150); setTimeout(()=>playTone(659, 0.12, 'sine', 0.06), 300); setTimeout(()=>playTone(784, 0.2, 'sine', 0.07), 450); }
function sfxAchievement() { initAudio(); playTone(523, 0.1, 'triangle', 0.06); setTimeout(()=>playTone(659, 0.1, 'triangle', 0.06), 100); setTimeout(()=>playTone(784, 0.1, 'triangle', 0.06), 200); setTimeout(()=>playTone(1047, 0.15, 'triangle', 0.07), 300); }
function sfxMatch() { initAudio(); playTone(600, 0.06, 'sine', 0.05); setTimeout(()=>playTone(900, 0.08, 'sine', 0.05), 60); }

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  if (btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) sfxClick();
}

// Add sound toggle button to DOM
function ensureSoundButton() {
  if (document.getElementById('soundBtn')) return;
  const btn = document.createElement('button');
  btn.id = 'soundBtn';
  btn.className = 'sound-toggle';
  btn.textContent = '🔊';
  btn.onclick = toggleSound;
  btn.title = '音效开关';
  document.body.appendChild(btn);
}
ensureSoundButton();

// ═══════════════════════════════════════════
// PARTICLE BACKGROUND — cherry blossoms, hearts, sparkles
// ═══════════════════════════════════════════
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, petals = [], sparkles = [], hearts = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Cherry blossom petals
for (let i = 0; i < 35; i++) {
  petals.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 6 + 3,
    vx: (Math.random() - 0.5) * 0.3,
    vy: Math.random() * 0.5 + 0.15,
    angle: Math.random() * Math.PI * 2,
    rot: (Math.random() - 0.5) * 0.02,
    o: Math.random() * 0.5 + 0.35,
    hue: Math.random() * 30 + 340 // pink range
  });
}

// Golden sparkles
for (let i = 0; i < 25; i++) {
  sparkles.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.2,
    vy: (Math.random() - 0.5) * 0.2 - 0.1,
    o: Math.random() * 0.6 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.03 + 0.01
  });
}

// Floating hearts
for (let i = 0; i < 10; i++) {
  hearts.push({
    x: Math.random() * W, y: Math.random() * H,
    size: Math.random() * 8 + 4,
    vy: -(Math.random() * 0.15 + 0.05),
    vx: (Math.random() - 0.5) * 0.2,
    o: Math.random() * 0.25 + 0.08,
    phase: Math.random() * Math.PI * 2
  });
}

function drawPetal(x, y, r, angle, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  // Vein
  ctx.beginPath();
  ctx.moveTo(-r, 0);
  ctx.lineTo(r, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.restore();
}

function drawHeart(x, y, size, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 20, size / 20);
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.bezierCurveTo(-8, -14, -18, -6, 0, 10);
  ctx.bezierCurveTo(18, -6, 8, -14, 0, -8);
  ctx.fillStyle = `rgba(233,30,99,${alpha})`;
  ctx.fill();
  ctx.restore();
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);

  // Draw petals
  for (const p of petals) {
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.rot;
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
    if (p.y > H + 20) { p.y = -20; p.x = Math.random() * W; }
    drawPetal(p.x, p.y, p.r, p.angle, `hsla(${p.hue}, 70%, 75%, ${p.o})`);
  }

  // Draw sparkles
  for (const s of sparkles) {
    s.x += s.vx;
    s.y += s.vy;
    s.o = 0.2 + Math.sin(s.phase) * 0.25;
    s.phase += s.speed;
    if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
    if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,215,0,${s.o})`;
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,215,0,${s.o * 0.2})`;
    ctx.fill();
  }

  // Draw hearts
  for (const h of hearts) {
    h.x += h.vx;
    h.y += h.vy;
    h.o = 0.08 + Math.sin(h.phase) * 0.06;
    h.phase += 0.01;
    if (h.y < -30) { h.y = H + 30; h.x = Math.random() * W; }
    if (h.x < -20) h.x = W + 20; if (h.x > W + 20) h.x = -20;
    drawHeart(h.x, h.y, h.size, h.o);
  }

  // Subtle connections between nearby sparkles
  for (let i = 0; i < sparkles.length; i++) {
    for (let j = i + 1; j < sparkles.length; j++) {
      const dx = sparkles[i].x - sparkles[j].x;
      const dy = sparkles[i].y - sparkles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        ctx.beginPath();
        ctx.moveTo(sparkles[i].x, sparkles[i].y);
        ctx.lineTo(sparkles[j].x, sparkles[j].y);
        ctx.strokeStyle = `rgba(255,183,77,${0.04 * (1 - dist / 80)})`;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

// GAME STATE
// ═══════════════════════════════════════════
const DEFAULT_STATE = {
  semester: 0, week: 0,
  coding: 10, social: 15, appearance: 20, romance: 5, gpa: 2.0, energy: 80, money: 500,
  chars: {
    lin: { affection: 0, stage: 'stranger', met: false },
    su: { affection: 0, stage: 'stranger', met: false },
    lu: { affection: 0, stage: 'stranger', met: false },
    ye: { affection: 0, stage: 'stranger', met: false },
  },
  inventory: [], itemsUsed: {},
  achievements: [],
  gymStreak: 0, restStreak: 0, rejected: 0, failedExams: 0,
  canteenEvents: 0, timeMaster: false,
  narrative: [], currentEvent: null,
  phase: 'title', // title, playing, event, choice, minigame, ending, review, dialogue
  examResults: [],
  dateCount: 0, confessedTo: [],
  lastAction: null, nextMinigame: null,
  timeline: [], // { sem, week, type, text, char }
  personality: { brave: 0, kind: 0, nerdy: 0, romantic: 0, lazy: 0 }, // trait scores
  dateHistory: [], // { char, location, affectionGained }
  dialogueState: null, // current dialogue session
};

let S = JSON.parse(JSON.stringify(DEFAULT_STATE));
S.chars.lin.met = false; S.chars.su.met = false; S.chars.lu.met = false; S.chars.ye.met = false;

// ═══════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function randInt(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[randInt(arr.length)]; }
function gpaText(v) { return v.toFixed(2); }

function getStage(aff) {
  if (aff >= 60) return '恋人';
  if (aff >= 38) return '暧昧';
  if (aff >= 20) return '朋友';
  if (aff >= 8) return '认识';
  return '陌生人';
}

function applyEffects(eff, affTarget) {
  if (!eff) return;
  if (eff.coding) S.coding = clamp(S.coding + eff.coding, 0, 100);
  if (eff.social) S.social = clamp(S.social + eff.social, 0, 100);
  if (eff.appearance) S.appearance = clamp(S.appearance + eff.appearance, 0, 100);
  if (eff.romance) S.romance = clamp(S.romance + eff.romance, 0, 100);
  if (eff.gpa) S.gpa = clamp(S.gpa + eff.gpa, 0, 4.0);
  if (eff.energy) S.energy = clamp(S.energy + eff.energy, 0, 100);
  if (eff.money) S.money = Math.max(0, S.money + eff.money);
  if (affTarget) {
    for (const [cid, val] of Object.entries(affTarget)) {
      if (S.chars[cid]) {
        S.chars[cid].affection = clamp(S.chars[cid].affection + val, 0, 100);
        S.chars[cid].stage = getStage(S.chars[cid].affection);
      }
    }
  }
}

function hasItem(id) { return S.inventory.includes(id); }
function useItem(id) {
  const idx = S.inventory.indexOf(id);
  if (idx === -1) return false;
  S.inventory.splice(idx, 1);
  const item = ITEMS.find(i => i.id === id);
  if (item) {
    if (item.effect.codingBoost) S.itemsUsed.codingBoost = true;
    if (item.effect.dateBoost) S.itemsUsed.dateBoost = true;
    if (item.effect.lucky) S.itemsUsed.lucky = true;
    applyEffects(item.effect);
  }
  return true;
}

function checkAchievements() {
  for (const ach of ACHIEVEMENTS) {
    if (!S.achievements.includes(ach.id) && ach.check(S)) {
      S.achievements.push(ach.id);
      const a = ACHIEVEMENTS.find(x => x.id === ach.id);
      S.narrative.push({ type: 'achievement', text: `🏆 成就解锁：${a.emoji} ${a.name} —— ${a.desc}` });
      sfxAchievement();
    }
  }
}

function addTimeline(type, text, char) {
  S.timeline.push({ sem: S.semester, week: S.week, type, text, char });
}

function updatePersonality(trait) {
  if (trait && S.personality[trait] !== undefined) {
    S.personality[trait] = Math.min(S.personality[trait] + 1, 10);
  }
}

function getDominantTrait() {
  let best = '', max = 0;
  const names = { brave: '勇敢', kind: '温柔', nerdy: '学霸', romantic: '浪漫', lazy: '佛系' };
  for (const [k, v] of Object.entries(S.personality)) {
    if (v > max) { max = v; best = k; }
  }
  return { key: best, name: names[best] || '普通', score: max };
}

function startNewGame() {
  sfxSuccess();
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  S.chars = {
    lin: { affection: 0, stage: 'stranger', met: false },
    su: { affection: 0, stage: 'stranger', met: false },
    lu: { affection: 0, stage: 'stranger', met: false },
    ye: { affection: 0, stage: 'stranger', met: false },
  };
  S.phase = 'playing';
  S.timeline = [];
  S.personality = { brave: 0, kind: 0, nerdy: 0, romantic: 0, lazy: 0 };
  S.dateHistory = [];
  S.narrative = [{ type: 'system', text: '🌅 九月的武汉，热得像蒸笼。你拖着一个行李箱，站在华科南大门前。你是华中科技大学计算机学院的一名新生。接下来的四年，会发生什么呢？' }];
  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  addTimeline('study', '入学华科计院，大学生活正式开始', null);
  renderGame();
}

function doAction(actionId) {
  if (S.phase !== 'playing') return;
  const action = BASE_ACTIONS.find(a => a.id === actionId);
  if (!action) return;

  // Check costs
  if (action.cost.energy && S.energy < action.cost.energy) {
    S.narrative.push({ type: 'error', text: '⚡ 精力不足！你需要休息一下。' });
    renderGame();
    return;
  }
  if (action.cost.money && S.money < action.cost.money) {
    S.narrative.push({ type: 'error', text: '💰 钱不够了！可以考虑做兼职或者省着点花。' });
    renderGame();
    return;
  }

  // Apply costs
  if (action.cost.energy) S.energy -= action.cost.energy;
  if (action.cost.money) S.money -= action.cost.money;

  // Apply boosts
  let eff = { ...action.eff };
  if (S.itemsUsed.codingBoost && action.cat === 'coding') {
    eff.coding = Math.floor((eff.coding || 0) * 1.5);
    S.itemsUsed.codingBoost = false;
    S.narrative.push({ type: 'system', text: '🎓 网课会员生效！编程力增长×1.5！' });
  }
  if (S.itemsUsed.dateBoost && action.cat === 'romance') {
    S.itemsUsed.dateBoost = false;
    S.narrative.push({ type: 'system', text: '🎬 电影票已使用！本次约会好感度+8！' });
  }

  applyEffects(eff);

  // Track streaks
  if (actionId === 'gym') S.gymStreak++; else S.gymStreak = 0;
  if (actionId === 'rest') S.restStreak++; else S.restStreak = 0;
  if (actionId === 'date') S.dateCount++;
  S.lastAction = actionId;

  // Character encounter
  if (action.char) {
    const c = S.chars[action.char];
    if (!c.met && S.semester >= 0) {
      c.met = true;
      c.affection = clamp(c.affection + 10, 0, 100);
      c.stage = getStage(c.affection);
      const cd = CHARACTERS[action.char];
      S.narrative.push({ type: 'event', text: cd.events.meet.text, char: action.char });
      addTimeline('social', `第一次遇见${cd.name}`, action.char);
      sfxHeart();
    } else if (c.met) {
      c.affection = clamp(c.affection + 5, 0, 100);
      c.stage = getStage(c.affection);
      if (Math.random() < 0.35) {
        const cd = CHARACTERS[action.char];
        S.narrative.push({ type: 'event', text: `你${action.name}时遇到了${cd.name}。她对你笑了笑。好感度+5。`, char: action.char });
        sfxHeart();
      }
    }
  }

  // Narrative
  S.narrative.push({ type: 'action', text: `▶ 你选择了「${action.name}」——${action.desc}` });

  // Track timeline for important actions
  if (actionId === 'date') { addTimeline('love', `主动约会，踏出了勇敢的一步`, action.char || null); S.personality.brave = Math.min(S.personality.brave + 1, 10); }
  if (actionId === 'study') { S.personality.nerdy = Math.min(S.personality.nerdy + 1, 10); }
  if (actionId === 'leetcode') { S.personality.nerdy = Math.min(S.personality.nerdy + 1, 10); }
  if (actionId === 'rest') { S.personality.lazy = Math.min(S.personality.lazy + 1, 10); }
  if (actionId === 'gym') { S.personality.brave = Math.min(S.personality.brave + 1, 10); }

  // Random mini-game trigger from actions
  if (actionId === 'date' && Math.random() < 0.3 && S.dateCount <= 2) {
    S.nextMinigame = 'typing';
  } else if (actionId === 'club' && Math.random() < 0.3) {
    S.nextMinigame = 'match';
  } else if (actionId === 'lab' && Math.random() < 0.25) {
    S.nextMinigame = 'debug';
  }

  // Advance week
  S.week++;
  if (S.week >= 4) {
    endSemester();
    return;
  }

  // Weekend random event
  triggerRandomEvent();
  if (S.nextMinigame) {
    const mg = S.nextMinigame;
    S.nextMinigame = null;
    startMinigame(mg);
    return;
  }
  checkAchievements();
  renderGame();
}

function triggerRandomEvent() {
  if (S.itemsUsed.lucky) {
    S.itemsUsed.lucky = false;
    const goodEvents = RANDOM_EVENTS.filter(e => e.flavor === 'good' && e.cond(S));
    if (goodEvents.length > 0) {
      const ev = pick(goodEvents);
      S.narrative.push({ type: 'event', text: '🍀 幸运符生效！' + ev.text, char: ev.char });
      applyEffects(ev.eff, ev.charEff || null);
      if (ev.minigame) { S.nextMinigame = ev.minigame; }
      if (ev.id === 'r25') S.canteenEvents++;
      sfxEvent();
      return;
    }
  }

  const eligible = RANDOM_EVENTS.filter(e => e.cond(S));
  if (eligible.length === 0) return;
  const ev = pick(eligible);
  S.narrative.push({ type: 'event', text: ev.text, char: ev.char });
  applyEffects(ev.eff, ev.charEff || null);
  if (ev.id === 'r1') S.canteenEvents++;
  if (ev.minigame) { S.nextMinigame = ev.minigame; }
  if (ev.flavor === 'good') sfxEvent(); else if (ev.flavor === 'bad') sfxFail();
}

function endSemester() {
  // Exam
  const examScore = S.coding * 0.3 + S.gpa * 25 + randInt(30);
  let examText = '';
  if (examScore > 80) {
    examText = '📝 期末考试：你考得很好！GPA稳中有升。';
    S.gpa = clamp(S.gpa + 0.15, 0, 4.0);
  } else if (examScore > 50) {
    examText = '📝 期末考试：马马虎虎，及格万岁。';
    S.gpa = clamp(S.gpa + 0.05, 0, 4.0);
  } else {
    examText = '📝 期末考试：你挂了一科…GPA大幅下滑。';
    S.gpa = clamp(S.gpa - 0.3, 0, 4.0);
    S.failedExams++;
  }
  S.narrative.push({ type: 'exam', text: examText });

  // Semester-specific event
  const semEventText = SEM_EVENTS[S.semester];
  S.narrative.push({ type: 'system', text: `🎯 本学期大事件：${semEventText}` });

  // Trigger character key events
  for (const [cid, cdata] of Object.entries(CHARACTERS)) {
    const char = S.chars[cid];
    if (!char.met) continue;
    for (const [ekey, edata] of Object.entries(cdata.events)) {
      if (ekey === 'meet') continue;
      if (edata.sem === S.semester && char.affection >= edata.need && !S[`event_${cid}_${ekey}`]) {
        S[`event_${cid}_${ekey}`] = true;
        S.narrative.push({ type: 'keyevent', text: `⭐ ${cdata.name}关键事件：${edata.text}`, char: cid });
        char.affection = clamp(char.affection + 12, 0, 100);
        char.stage = getStage(char.affection);
        sfxHeart();
        addTimeline('love', `⭐ ${cdata.name}关键事件`, cid);
      }
    }
  }

  // Trigger choice events
  for (const ce of CHOICE_EVENTS) {
    if (S[`choice_${ce.id}`]) continue;
    if (S.semester < ce.semMin) continue;

    if (ce.char === null) {
      // Universal event: trigger if ANY character meets threshold
      const anyChar = Object.entries(S.chars).find(([, c]) => c.met && c.affection >= ce.need);
      if (anyChar) {
        S[`choice_${ce.id}`] = true;
        S.currentEvent = ce;
        S.phase = 'choice';
        renderChoice();
        return;
      }
      continue;
    }

    const char = S.chars[ce.char];
    if (!char || !char.met) continue;
    if (char.affection >= ce.need) {
      S[`choice_${ce.id}`] = true;
      S.currentEvent = ce;
      S.phase = 'choice';
      renderChoice();
      return;
    }
  }

  // Next semester
  S.semester++;
  S.week = 0;
  S.energy = clamp(S.energy + 30, 0, 100);

  if (S.semester >= 7) {
    calculateEnding();
    return;
  }

  addTimeline('study', `${SEMESTERS[S.semester]} 开学`, null);
  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  S.narrative.push({ type: 'system', text: '💡 新学期新气象。你想做点什么？' });

  // Trigger meet events for new semester
  if (S.semester === 1 && !S.chars.ye.met) {
    S.chars.ye.met = true;
    S.chars.ye.affection = 5;
    S.chars.ye.stage = getStage(S.chars.ye.affection);
    S.narrative.push({ type: 'event', text: CHARACTERS.ye.events.meet.text, char: 'ye' });
    addTimeline('social', `认识了${CHARACTERS.ye.name}`, 'ye');
  }

  // Try to trigger date dialogue
  if (S.dateCount >= 1) {
    for (const scene of DATE_SCENES) {
      if (S[`date_${scene.id}`]) continue;
      if (!scene.trigger(S)) continue;
      S[`date_${scene.id}`] = true;
      // Find a character with high enough affection
      for (const [cid, c] of Object.entries(S.chars)) {
        if (!c.met || c.affection < 30) continue;
        if (!scene.dialogues[cid]) continue;
        S.dialogueState = { scene, charId: cid, step: 0 };
        S.phase = 'dialogue';
        renderDialogue();
        return;
      }
    }
  }

  checkAchievements();
  renderGame();
}

function resolveChoice(choiceIdx) {
  const ce = S.currentEvent;
  if (!ce) return;
  const choice = ce.choices[choiceIdx];
  applyEffects(choice.eff, choice.affection || null);
  S.narrative.push({ type: 'choice', text: `💬 你选择了：「${choice.text}」` });

  // Track timeline and personality
  addTimeline('dilemma', `${ce.title}：${choice.text.slice(0, 20)}…`, ce.char);
  // Infer personality from choice
  if (choiceIdx === 0) S.personality.brave = Math.min(S.personality.brave + 1, 10);
  if (choiceIdx === 1) S.personality.kind = Math.min(S.personality.kind + 1, 10);

  // Check time master achievement
  if (S.dateCount >= 2 && S.week <= 3) S.timeMaster = true;

  S.currentEvent = null;
  S.phase = 'playing';

  // Continue semester progression
  S.semester++;
  S.week = 0;
  S.energy = clamp(S.energy + 30, 0, 100);

  if (S.semester >= 7) {
    calculateEnding();
    return;
  }

  addTimeline('study', `${SEMESTERS[S.semester]} 开学`, null);
  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  checkAchievements();
  renderGame();
}

function confess(characterId) {
  if (S.phase !== 'playing') return;
  const char = S.chars[characterId];
  if (!char || !char.met) { S.narrative.push({ type: 'error', text: '你还不认识这个人。' }); renderGame(); return; }
  if (char.stage === '恋人') { S.narrative.push({ type: 'error', text: '你们已经是恋人了！' }); renderGame(); return; }
  if (S.confessedTo.includes(characterId)) { S.narrative.push({ type: 'error', text: '你已经表白过了，再表白就成骚扰了…' }); renderGame(); return; }

  S.confessedTo.push(characterId);
  const successChance = char.affection / 100 * 0.85 + S.romance / 100 * 0.1 + S.appearance / 100 * 0.05;

  if (char.stage === '暧昧' && successChance > 0.3) {
    char.affection = clamp(char.affection + 25, 0, 100);
    char.stage = '恋人';
    S.narrative.push({ type: 'confession', text: `💕 表白成功！${CHARACTERS[characterId].name}脸红了：「…我也喜欢你。」你们在一起了！`, char: characterId });
    sfxConfession();
    spawnHeartRain();
    addTimeline('love', `💕 向${CHARACTERS[characterId].name}表白成功！`, characterId);
    S.personality.brave = Math.min(S.personality.brave + 2, 10);
  } else if (char.stage === '朋友' && successChance > 0.4) {
    char.affection = clamp(char.affection + 20, 0, 100);
    char.stage = getStage(char.affection);
    S.narrative.push({ type: 'confession', text: `💕 表白成功！${CHARACTERS[characterId].name}有些惊讶，但还是点了点头。`, char: characterId });
    sfxConfession();
    spawnHeartRain();
    addTimeline('love', `💕 向${CHARACTERS[characterId].name}表白成功！`, characterId);
    S.personality.brave = Math.min(S.personality.brave + 2, 10);
  } else {
    S.rejected++;
    S.narrative.push({ type: 'confession', text: `💔 被发好人卡了…「你很好，但是…」${CHARACTERS[characterId].name}委婉地拒绝了你。`, char: characterId });
    char.affection = clamp(char.affection - 5, 0, 100);
    char.stage = getStage(char.affection);
    sfxFail();
  }
  checkAchievements();
  renderGame();
}

function calculateEnding() {
  S.phase = 'ending';
  // Career ending
  let careerEnding;
  if (S.coding >= 90 && S.gpa >= 3.5) careerEnding = { id: 'bytedance', text: '🏆 字节跳动 SSP offer！', desc: '你在秋招中大杀四方，拿下了字节跳动的Special Offer。年薪让全班同学都酸了。' };
  else if (S.coding >= 60) careerEnding = { id: 'midjob', text: '💼 中厂offer', desc: '你找到了一份不错的工作，虽然比不上大厂，但也能在光谷过得滋润。' };
  else if (S.gpa >= 3.8 && S.coding >= 70) careerEnding = { id: 'tsinghua', text: '🎓 保研清华！', desc: '你的GPA一路领跑，成功拿到了清华的保研名额。整个学院都在传你的名字。' };
  else if (S.gpa >= 3.0) careerEnding = { id: 'hustmaster', text: '🎓 保研本校', desc: '你选择留在华科继续读研。熟悉的环境，熟悉的人，也是一种幸福。' };
  else if (S.money >= 3000 && S.coding >= 60 && S.gpa < 2.5) careerEnding = { id: 'startup', text: '🚀 休学创业', desc: '你拉了几个同学在光谷租了个办公室，开始创业。投资人是个华科校友——他说他当年也在南一楼写过代码。' };
  else if (S.coding < 50 && S.gpa >= 2.5 && S.gpa <= 3.5 && S.social >= 60) careerEnding = { id: 'civil', text: '📜 考公上岸', desc: '你考上了公务员，过上了朝九晚五的生活。偶尔在朋友圈看到前同事的加班动态，你微微一笑。' };
  else if (S.gpa >= 3.5 && S.money >= 1500) careerEnding = { id: 'abroad', text: '🌍 出国留学', desc: '你申请到了美国CS名校的offer。在机场告别家人的时候，你发了一条朋友圈：「出发了，四年后再见。」' };
  else if (S.coding >= 85 && S.social < 30 && S.romance < 20) careerEnding = { id: 'indie', text: '👨‍💻 独立开发者', desc: '你成了一个独立开发者，做了一个小有名气的开源项目。GitHub上star数破了万，但你的微信置顶永远是技术群。' };
  else if (S.gpa < 1.8 && S.coding < 40) careerEnding = { id: 'delay', text: '💀 延毕', desc: '学分不够，你延毕了一年。但这一年里，你想清楚了很多事情——比如人生的意义不只有GPA。' };
  else careerEnding = { id: 'normal', text: '💼 普通offer', desc: '你找到了一份普通的工作。没什么特别的，但也没什么不好的。大多数人的故事，就是这样。' };

  // Love ending
  let loveEndings = [];
  for (const [cid, cdata] of Object.entries(CHARACTERS)) {
    const char = S.chars[cid];
    if (char.stage === '恋人') {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.love, tier: 'love' });
    } else if (char.affection >= 50) {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.ambiguous, tier: 'ambiguous' });
    } else if (char.affection >= 20) {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.miss, tier: 'miss' });
    }
  }

  // Special endings
  const allLow = Object.values(S.chars).every(c => c.affection < 20);
  const allHigh = Object.values(S.chars).filter(c => c.affection >= 60).length >= 3;
  const loveCount = loveEndings.filter(l => l.tier === 'love').length;
  const codeLove = S.coding >= 95 && S.dateCount === 0 && allLow;

  // Calculate score
  let score = 0;
  score += Math.floor(S.coding / 10); // 0-10
  score += Math.floor(S.social / 10); // 0-10
  score += Math.floor(S.appearance / 10); // 0-10
  score += Math.floor(S.romance / 10); // 0-10
  score += Math.floor(S.gpa * 20); // 0-80 → 0-8 range
  score += (Object.values(S.chars).filter(c => c.stage === '恋人').length) * 15;
  score += (Object.values(S.chars).filter(c => c.affection >= 40).length) * 5;
  score += S.achievements.length * 3;
  score -= S.rejected * 2;
  score -= S.failedExams * 5;
  score = clamp(score, 0, 100);
  const rank = score >= 85 ? 'SSS' : score >= 70 ? 'SS' : score >= 55 ? 'S' : score >= 40 ? 'A' : score >= 25 ? 'B' : 'C';
  const rankTitle = score >= 85 ? '华科情圣' : score >= 70 ? '人生赢家' : score >= 55 ? '校园风云人物' : score >= 40 ? '普通大学生' : score >= 25 ? '平平无奇' : '代码孤狼';

  S.ending = { career: careerEnding, love: loveEndings, allLow, allHigh, loveCount, codeLove, score, rank, rankTitle };
  checkAchievements();
  renderEnding();
}

function spawnHeartRain() {
  const container = document.createElement('div');
  container.className = 'heart-rain';
  const emojis = ['❤️', '💖', '💕', '💗', '💝', '✨', '💫'];
  for (let i = 0; i < 35; i++) {
    const drop = document.createElement('div');
    drop.className = 'heart-drop';
    drop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    drop.style.cssText = `
      left: ${Math.random() * 95}%;
      --hs: ${18 + Math.random() * 28}px;
      --hd: ${1.5 + Math.random() * 2.5}s;
      --hdel: ${Math.random() * 1.5}s;
      --hr: ${(Math.random() - 0.5) * 360}deg;
    `;
    container.appendChild(drop);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 4000);
}

function showGameToast(msg) {
  const existing = document.querySelector('.game-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'game-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function renderCharPortrait(cid) {
  const cd = CHARACTERS[cid];
  const c = S.chars[cid];
  if (!cd || !c || !c.met) return '';
  const stageEmoji = c.stage === '恋人' ? '💕' : c.stage === '暧昧' ? '💛' : c.stage === '朋友' ? '💚' : '🤍';
  return html`
    <div class="char-portrait ${cid} portrait-${cid}">
      <div class="char-portrait-avatar">${cd.emoji}</div>
      <div class="char-portrait-info">
        <div class="char-portrait-name">${cd.name} · ${cd.full}</div>
        <div class="char-portrait-title">${cd.title}</div>
        <div class="char-portrait-affection">${stageEmoji} ${c.stage} · 好感 ${Math.floor(c.affection)}</div>
      </div>
    </div>
  `;
}

function renderGame() {
  S.phase = 'playing';
  const sem = SEMESTERS[S.semester];
  const semEvent = SEM_EVENTS[S.semester];

  // Build narrative HTML
  const recentNarr = S.narrative.slice(-8);
  let narrHTML = recentNarr.map(n => {
    let cls = '';
    if (n.type === 'error') cls = 'highlight';
    if (n.type === 'achievement') cls = 'name-tag';
    if (n.type === 'confession') cls = 'highlight';
    if (n.type === 'keyevent') cls = 'name-tag';
    if (n.char) cls += ' narr-' + n.char;
    return `<p class="${cls}">${n.text}</p>`;
  }).join('');

  // Stat bars
  const stats = [
    { label: '编程力', val: S.coding, cls: 'fill-coding' },
    { label: '社交力', val: S.social, cls: 'fill-social' },
    { label: '颜值',   val: S.appearance, cls: 'fill-appearance' },
    { label: '浪漫值', val: S.romance, cls: 'fill-romance' },
    { label: 'GPA',    val: S.gpa, cls: 'fill-gpa', fmt: v => gpaText(v), max: 4.0 },
  ];
  let statsHTML = stats.map(s => {
    const pct = s.max ? (s.val / s.max * 100) : s.val;
    const display = s.fmt ? s.fmt(s.val) : Math.floor(s.val);
    return html`
      <div class="stat-item">
        <div class="stat-label"><span>${s.label}</span><span>${display}</span></div>
        <div class="stat-bar-bg"><div class="stat-bar-fill ${s.cls}" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');

  // Character tags
  let charsHTML = Object.entries(CHARACTERS).map(([cid, cd]) => {
    const c = S.chars[cid];
    const pct = c.affection;
    return html`
      <div class="char-tag${c.met ? '' : ' locked'}">
        <div class="char-name">${cd.emoji} ${cd.name} <span class="char-stage">· ${c.met ? c.stage : '???'}</span></div>
        <div class="char-hearts">${c.met ? '💕'.repeat(Math.floor(c.affection / 20) + 1) : '🔒'}</div>
        <div class="char-bar-bg"><div class="char-bar-fill" style="width:${c.met ? pct : 0}%"></div></div>
      </div>
    `;
  }).join('');

  // Actions
  let actionsHTML = BASE_ACTIONS.map(a => {
    return html`<button class="btn" onclick="sfxClick();doAction('${a.id}')" title="${a.desc}">${a.icon} ${a.name}</button>`;
  }).join('');

  // Confess buttons
  let confessHTML = Object.entries(CHARACTERS).map(([cid, cd]) => {
    const c = S.chars[cid];
    if (!c.met || c.stage === '恋人') return '';
    return html`<button class="btn small" onclick="sfxHeart();confess('${cid}')" ${S.confessedTo.includes(cid) ? 'disabled' : ''}>💌 向${cd.name}表白</button>`;
  }).filter(Boolean).join('');

  // Items
  let inventoryHTML = '';
  if (S.inventory.length > 0) {
    inventoryHTML = '<div style="margin-top:6px;font-size:0.7rem;color:#8d6e63;">🎒 背包：';
    S.inventory.forEach(id => {
      const item = ITEMS.find(i => i.id === id);
      inventoryHTML += ` <span style="cursor:pointer;color:#7c4dff;" onclick="useItem('${id}');renderGame();" title="${item.desc}">${item.emoji}${item.name}</span>`;
    });
    inventoryHTML += '</div>';
  }

  // Shop
  let shopHTML = '<div style="margin-top:4px;font-size:0.7rem;color:#8d6e63;">🛒 ';
  ITEMS.forEach(item => {
    shopHTML += `<span style="cursor:pointer;color:#2e7d32;margin-right:8px;" onclick="if(S.money>=${item.price}){S.money-=${item.price};S.inventory.push('${item.id}');renderGame();}" title="${item.desc}">${item.emoji}¥${item.price}</span>`;
  });
  shopHTML += `</div>`;

  app.innerHTML = html`
    <div class="card">
      <div class="game-title" style="font-size:1.4rem;">华科计院找爱情</div>
      <div class="top-bar">
        <span class="top-tag">📅 ${sem} · 第${S.week + 1}周</span>
        <span class="top-tag" style="background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#2e7d32;">🎯 ${semEvent}</span>
        <span class="top-stat">⚡ <span>${S.energy}</span></span>
        <span class="top-stat">💰 <span>¥${S.money}</span></span>
      </div>
    </div>

    <div class="card">
      <div class="narrative" id="narrativeBox">${narrHTML || '<p style="color:#8d6e63;">新学期开始了，选择你的行动吧！</p>'}</div>
    </div>

    <div class="card">
      <div class="stat-row">${statsHTML}</div>
    </div>

    <div class="card">
      <div class="char-row">${charsHTML}</div>
      ${inventoryHTML}
      ${shopHTML}
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="color:#8d6e63;font-size:0.75rem;">🧬 个性</div>
        <div style="font-size:0.7rem;color:#e91e63;font-weight:600;">${getDominantTrait().name}型</div>
      </div>
      <div class="personality-row" style="margin-bottom:8px;">
        ${['brave','kind','nerdy','romantic','lazy'].map(t => {
          const names = { brave:'🦁', kind:'🤝', nerdy:'📖', romantic:'💘', lazy:'🛌' };
          const lvl = S.personality[t] || 0;
          return `<span class="personality-badge${lvl >= 5 ? ' active' : ''}" title="${t}">${names[t]} Lv.${lvl}</span>`;
        }).join('')}
      </div>
      <div style="color:#8d6e63;font-size:0.75rem;margin-bottom:6px;">🎯 选择行动</div>
      <div class="actions-grid">${actionsHTML}</div>
      ${confessHTML ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${confessHTML}</div>` : ''}
      <div style="margin-top:8px;text-align:center;">
        <button class="btn small" onclick="saveGame()">💾 保存</button>
        <button class="btn small danger" onclick="if(confirm('确定要重新开始吗？当前进度将丢失。'))startNewGame()">🔄 重新开始</button>
      </div>
    </div>
  `;
  // Auto-scroll narrative
  setTimeout(() => {
    const box = document.getElementById('narrativeBox');
    if (box) box.scrollTop = box.scrollHeight;
  }, 50);
}

function renderChoice() {
  const ce = S.currentEvent;
  if (!ce) { S.phase = 'playing'; renderGame(); return; }

  // Show character portrait if event has a char
  let portraitHTML = '';
  if (ce.char && S.chars[ce.char] && S.chars[ce.char].met) {
    portraitHTML = renderCharPortrait(ce.char);
  }

  let choicesHTML = ce.choices.map((c, i) => {
    return html`<button class="choice-btn" onclick="sfxClick();resolveChoice(${i})">${c.text}</button>`;
  }).join('');

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        ${portraitHTML}
        <div class="overlay-title">⚡ ${ce.title}</div>
        <div class="overlay-text">${ce.text}</div>
        ${choicesHTML}
      </div>
    </div>
  `;
}

function showAchievements() {
  let gridHTML = ACHIEVEMENTS.map(a => {
    const unlocked = S.achievements.includes(a.id);
    return html`<div class="ach-item${unlocked ? ' unlocked' : ''}">
      <span class="ach-icon">${unlocked ? a.emoji : '🔒'}</span>
      <div><div style="font-weight:600;">${a.name}</div><div style="font-size:0.7rem;">${a.desc}</div></div>
    </div>`;
  }).join('');

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">🏆 成就收藏</div>

}

// ═══════════════════════════════════════════
// DATE DIALOGUE SYSTEM
// ═══════════════════════════════════════════
function renderDialogue() {
  const ds = S.dialogueState;
  if (!ds) { S.phase = 'playing'; renderGame(); return; }

  const scene = ds.scene;
  const cid = ds.charId;
  const cdata = CHARACTERS[cid];
  const dialogues = scene.dialogues[cid];
  const step = Math.min(ds.step, dialogues.length - 1);
  const d = dialogues[step];

  const charColors = { lin: '#7c4dff', su: '#ff6f00', lu: '#e91e63', ye: '#26a69a' };

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card" style="max-width:480px;">
        <div style="text-align:center;margin-bottom:8px;font-size:0.75rem;color:#8d6e63;">
          📍 ${scene.location}
        </div>
        <div class="dialogue-avatar" style="background:${charColors[cid] || '#e91e63'};">
          ${cdata.emoji}
        </div>
        <div style="text-align:center;color:#e91e63;font-size:0.8rem;font-weight:600;">
          📅 约会事件
        </div>
        <div style="color:#5d4037;font-size:0.82rem;text-align:center;margin:10px 0;line-height:1.7;">
          ${scene.setup}
        </div>
        <div class="dialogue-speaker">${d.speaker}</div>
        <div class="dialogue-line">${d.text}</div>
        <div class="dialogue-choices">
          ${d.replies.map((r, i) => html`
            <button class="dialogue-btn" onclick="sfxClick();resolveDialogue(${i})">💬 ${r.text}</button>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function resolveDialogue(replyIdx) {
  const ds = S.dialogueState;
  if (!ds) return;
  const scene = ds.scene;
  const cid = ds.charId;
  const dialogues = scene.dialogues[cid];
  const step = ds.step;
  const d = dialogues[step];
  const reply = d.replies[replyIdx];

  // Apply affection
  if (reply.aff) {
    S.chars[cid].affection = clamp(S.chars[cid].affection + reply.aff, 0, 100);
    S.chars[cid].stage = getStage(S.chars[cid].affection);
  }
  if (reply.trait) updatePersonality(reply.trait);

  S.narrative.push({ type: 'event', text: `💕 ${CHARACTERS[cid].name}约会：${reply.react}`, char: cid });
  addTimeline('love', `${CHARACTERS[cid].name} · ${scene.location}约会`, cid);
  S.dateHistory.push({ char: cid, location: scene.location, affectionGained: reply.aff || 0 });
  sfxHeart();

  // Check if more dialogue steps
  if (step + 1 < dialogues.length) {
    ds.step = step + 1;
    renderDialogue();
  } else {
    S.dialogueState = null;
    S.phase = 'playing';
    checkAchievements();
    renderGame();
  }
}

// ═══════════════════════════════════════════
// MINI GAMES (extra, triggered by events)
// ═══════════════════════════════════════════
function startMinigame(type) {
  if (type === 'debug') startDebugGame();
  else if (type === 'typing') startTypingGame();
  else if (type === 'match') startMatchGame();
}

function startDebugGame() {
  S.phase = 'minigame';
  const bugs = [
    { code: 'while(you.love(me)) {', line: 1, bug: 1, hint: '缺少 forever 条件' },
    { code: 'if (heart.beats == true)', line: 2, bug: 2, hint: '应该用 ===', fix: 'if (heart.beats === true)' },
    { code: 'return you && me;', line: 3, bug: 3, hint: '想要 forever ❤️', fix: 'return you && me && forever' },
  ];
  const target = pick(bugs);

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card minigame-card">
        <div class="minigame-heart">💝</div>
        <div class="overlay-title">💘 心动代码</div>
        <div style="color:#5d4037;font-size:0.85rem;margin-bottom:12px;">找出这段恋爱代码里的bug！25秒倒计时</div>
        <div class="minigame-timer-ring" id="debugTimer">⏱ 25s</div>
        <div style="margin:12px 0;">
          ${bugs.map((b, i) => html`
            <div class="minigame-target bug-btn" onclick="sfxClick();resolveDebug(${b.bug === target.bug})" id="bug${i}">
              ${b.code} <span style="font-size:0.7rem;color:#999;">${b.hint}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  let time = 25;
  window._debugInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('debugTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._debugInterval); resolveDebug(false); }
  }, 1000);
  window._debugTarget = target;
}

function resolveDebug(success) {
  clearInterval(window._debugInterval);
  if (success) {
    S.coding = clamp(S.coding + 8, 0, 100);
    S.narrative.push({ type: 'event', text: '✅ Bug修复成功！你对恋爱的理解又深了一层。编程力+8！' });
    sfxSuccess();
  } else {
    S.narrative.push({ type: 'event', text: '❌ Debug失败…但没关系，爱情本来就没有完美的代码。' });
    sfxFail();
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}
function startTypingGame() {
  S.phase = 'minigame';
  const phrases = ['you and me', 'forever us', 'i love you', 'be my valentine', 'love at first sight', 'together forever', 'you are my sunshine'];
  const target = pick(phrases);
  window._typingTarget = target;

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card minigame-card">
        <div class="minigame-heart">💌</div>
        <div class="overlay-title">⌨️ 心动打字</div>
        <div style="color:#5d4037;font-size:0.85rem;margin-bottom:12px;">快速打出这句话，练习你的告白手速！</div>
        <div class="minigame-timer-ring" id="typeTimer">⏱ 20s</div>
        <div class="minigame-target" style="font-size:1.6rem;text-align:center;letter-spacing:3px;color:#e91e63;font-weight:600;">${target}</div>
        <input id="typeInput" style="width:100%;padding:14px;border-radius:14px;border:2px solid rgba(233,30,99,0.3);background:#fff;color:#4e342e;font-size:1.2rem;text-align:center;margin-top:16px;font-family:inherit;outline:none;" placeholder="在这里输入..." autofocus>
      </div>
    </div>
  `;

  let time = 20;
  window._typeInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('typeTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._typeInterval); resolveTyping(false); }
  }, 1000);

  setTimeout(() => {
    const inp = document.getElementById('typeInput');
    if (inp) {
      inp.addEventListener('input', function() {
        if (this.value.toLowerCase().trim() === window._typingTarget) {
          resolveTyping(true);
        }
      });
      inp.focus();
    }
  }, 100);
}

function resolveTyping(success) {
  clearInterval(window._typeInterval);
  if (success) {
    S.romance = clamp(S.romance + 10, 0, 100);
    S.narrative.push({ type: 'event', text: '⌨️ 指尖在键盘上飞舞——你的告白手速让对方心跳加速！浪漫值+10！' });
    sfxSuccess();
  } else {
    S.narrative.push({ type: 'event', text: '⌨️ 打字超时…不过没关系，有些话不一定要打出来。' });
    sfxFail();
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}

function startMatchGame() {
  S.phase = 'minigame';
  const emojis = ['💻', '☕', '📚', '💕', '🎮', '🍜'];
  const cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  window._matchCards = cards;
  window._matchFlipped = [];
  window._matchMatched = [];
  window._matchLocked = false;

  let cardsHTML = cards.map((e, i) => html`
    <div class="bug-btn" id="card${i}" onclick="sfxClick();flipCard(${i})" style="width:50px;height:50px;display:inline-flex;align-items:center;justify-content:center;font-size:1.5rem;border-radius:10px;background:linear-gradient(135deg,#fce4ec,#f3e5f5);transition:all 0.2s;">❓</div>
  `).join('');

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card minigame-card">
        <div class="minigame-heart">💞</div>
        <div class="overlay-title">🃏 缘分匹配</div>
        <div style="color:#5d4037;font-size:0.85rem;margin-bottom:12px;">翻牌找到相同的emoji，配对吧！</div>
        <div class="minigame-timer-ring" id="matchTimer">⏱ 25s</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:280px;margin:16px auto;">${cardsHTML}</div>
      </div>
    </div>
  `;

  let time = 25;
  window._matchInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('matchTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._matchInterval); resolveMatch(false); }
  }, 1000);
}

function flipCard(idx) {
  if (window._matchLocked) return;
  if (window._matchFlipped.includes(idx)) return;
  if (window._matchMatched.includes(idx)) return;

  window._matchFlipped.push(idx);
  const el = document.getElementById('card' + idx);
  if (el) el.textContent = window._matchCards[idx];

  if (window._matchFlipped.length === 2) {
    window._matchLocked = true;
    const [a, b] = window._matchFlipped;
    if (window._matchCards[a] === window._matchCards[b]) {
      window._matchMatched.push(a, b);
      window._matchFlipped = [];
      window._matchLocked = false;
      sfxMatch();
      // Mark matched cards
      const ea = document.getElementById('card' + a);
      const eb = document.getElementById('card' + b);
      if (ea) ea.style.background = 'linear-gradient(135deg, #e8f5e9, #a5d6a7)';
      if (eb) eb.style.background = 'linear-gradient(135deg, #e8f5e9, #a5d6a7)';
      if (window._matchMatched.length === window._matchCards.length) {
        resolveMatch(true);
      }
    } else {
      setTimeout(() => {
        document.getElementById('card' + a).textContent = '❓';
        document.getElementById('card' + b).textContent = '❓';
        window._matchFlipped = [];
        window._matchLocked = false;
      }, 500);
    }
  }
}

function resolveMatch(success) {
  clearInterval(window._matchInterval);
  if (success) {
    S.social = clamp(S.social + 10, 0, 100);
    S.narrative.push({ type: 'event', text: '🃏 全部配对成功！你在联谊活动上大放异彩。社交力+10！' });
    sfxSuccess();
  } else {
    S.narrative.push({ type: 'event', text: '🃏 时间到了…联谊活动上你有点紧张。' });
    sfxFail();
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}

// ═══════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════
function saveGame() {
  const saveData = {
    ...S,
    currentEvent: null, // Don't save event reference
  };
  try {
    localStorage.setItem('hust_cs_love_save', JSON.stringify(saveData));
    S.narrative.push({ type: 'system', text: '💾 游戏已保存！' });
  } catch(e) {
    S.narrative.push({ type: 'error', text: '保存失败…' });
  }
  renderGame();
}

function loadGame() {
  try {
    const raw = localStorage.getItem('hust_cs_love_save');
    if (!raw) { alert('没有找到存档。'); return; }
    const data = JSON.parse(raw);
    S = data;
    // Restore character methods
    for (const cid of Object.keys(CHARACTERS)) {
      if (!S.chars[cid]) S.chars[cid] = { affection: 0, stage: 'stranger', met: false };
    }
    S.currentEvent = null;
    S.nextMinigame = null;
    S.dialogueState = null;
    S.itemsUsed = S.itemsUsed || {};
    S.timeline = S.timeline || [];
    S.personality = S.personality || { brave: 0, kind: 0, nerdy: 0, romantic: 0, lazy: 0 };
    S.dateHistory = S.dateHistory || [];
    if (S.phase === 'choice' || S.phase === 'dialogue') S.phase = 'playing';
    S.narrative.push({ type: 'system', text: '💾 存档已加载。欢迎回来！' });
    if (S.phase === 'ending') renderEnding();
    else renderGame();
  } catch(e) {
    alert('存档损坏，无法读取。');
  }
}
