* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #0a0a14;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;

/* Particle Background */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Main Container */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 720px; min-height: 100vh;
  padding: 12px;
}

/* Cards */
.card {
  background: rgba(22, 22, 42, 0.92); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
  padding: 20px 24px; margin-bottom: 10px;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes typewriter { from { width: 0; } to { width: 100%; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes glow { 0%,100% { box-shadow: 0 0 5px rgba(233,69,96,0.3); } 50% { box-shadow: 0 0 20px rgba(233,69,96,0.6); } }

/* Title */
.game-title {
  text-align: center; font-size: 1.8rem; font-weight: 900;
  background: linear-gradient(135deg, #e94560, #ff6b8a, #e94560);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: 4px; margin-bottom: 4px;
}
.subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 12px; }

/* Top Bar */
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.top-tag {
  background: #0f3460; color: #8ec8ff; padding: 4px 12px;
  border-radius: 20px; font-size: 0.8rem; font-weight: 600;
}
.top-stat {
  color: #ccc; font-size: 0.85rem;
}
.top-stat span { color: #e94560; font-weight: 700; }

/* Stat Bars */
.stat-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
}
.stat-item { margin: 2px 0; }
.stat-label {
  display: flex; justify-content: space-between;
  color: #aaa; font-size: 0.75rem; margin-bottom: 2px;
}
.stat-label span:last-child { color: #e94560; font-weight: 600; }
.stat-bar-bg {
  height: 6px; background: #1a1a3a; border-radius: 3px; overflow: hidden;
}
.stat-bar-fill {
  height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);

.fill-coding { background: linear-gradient(90deg, #0f3460, #4fc3f7); }
.fill-social { background: linear-gradient(90deg, #1b5e20, #66bb6a); }
.fill-appearance { background: linear-gradient(90deg, #880e4f, #f06292); }
.fill-romance { background: linear-gradient(90deg, #b71c1c, #ef5350); }
.fill-gpa { background: linear-gradient(90deg, #4a148c, #ba68c8); }

/* Character Affection */
.char-row { display: flex; gap: 8px; flex-wrap: wrap; }
.char-tag {
  flex: 1; min-width: 120px; background: #1a1a3a; border-radius: 10px;
  padding: 8px 12px; border: 1px solid rgba(255,255,255,0.05);
  transition: all 0.3s;
}
.char-tag.locked { opacity: 0.4; }
.char-name { color: #ddd; font-size: 0.8rem; font-weight: 600; }
.char-stage { color: #888; font-size: 0.7rem; }
.char-hearts { color: #e94560; font-size: 0.75rem; margin-top: 2px; }
.char-bar-bg { height: 3px; background: #252545; border-radius: 2px; margin-top: 3px; }
.char-bar-fill {

  transition: width 0.5s ease;

/* Narrative */
.narrative {
  min-height: 100px; max-height: 250px; overflow-y: auto;
  color: #ccc; font-size: 0.9rem; line-height: 1.7;
  padding: 8px 0;

.narrative .highlight { color: #e94560; font-weight: 600; }
.narrative .name-tag { color: #8ec8ff; }
.narrative::-webkit-scrollbar { width: 4px; }
.narrative::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* Action Buttons */
.actions-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.btn {
  padding: 10px 8px; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; background: #1a1a3a; color: #ccc;

.btn:hover { background: #252550; border-color: #e94560; color: #fff; transform: translateY(-1px); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: #e94560; color: #fff; border-color: #e94560; font-weight: 700; }

.btn.danger { background: #3a1a1a; border-color: #e94560; color: #e94560; }

  .actions-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-row { grid-template-columns: 1fr; }
  .char-tag { min-width: 100%; }

.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }

// PARTICLE BACKGROUND
// ═══════════════════════════════════════════
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    o: Math.random() * 0.5 + 0.2
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(233,69,96,${p.o})`;
    ctx.fill();
  }
  // Lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(233,69,96,${0.06 * (1 - dist / 100)})`;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ═══════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function randInt(n) { return Math.floor(Math.random() * n); }
function pick(arr) { return arr[randInt(arr.length)]; }
function gpaText(v) { return v.toFixed(2); }

function getStage(aff) {
  if (aff >= 80) return '恋人';
  if (aff >= 50) return '暧昧';
  if (aff >= 30) return '朋友';
  if (aff >= 15) return '认识';
  return '陌生人';
}

function applyEffects(eff, affTarget) {
  if (!eff) return;
  if (eff.coding) S.coding = clamp(S.coding + eff.coding, 0, 100);
  if (eff.social) S.social = clamp(S.social + eff.social, 0, 100);
  if (eff.appearance) S.appearance = clamp(S.appearance + eff.appearance, 0, 100);
  if (eff.romance) S.romance = clamp(S.romance + eff.romance, 0, 100);
  if (eff.gpa) S.gpa = clamp(S.gpa + eff.gpa, 0, 4.0);
  if (eff.energy) S.energy = clamp(S.energy + eff.energy, 0, 100);
  if (eff.money) S.money = Math.max(0, S.money + eff.money);
  if (affTarget) {
    for (const [cid, val] of Object.entries(affTarget)) {
      if (S.chars[cid]) {
        S.chars[cid].affection = clamp(S.chars[cid].affection + val, 0, 100);
        S.chars[cid].stage = getStage(S.chars[cid].affection);
      }
    }
  }
}

function hasItem(id) { return S.inventory.includes(id); }
function useItem(id) {
  const idx = S.inventory.indexOf(id);
  if (idx === -1) return false;
  S.inventory.splice(idx, 1);
  const item = ITEMS.find(i => i.id === id);
  if (item) {
    if (item.effect.codingBoost) S.itemsUsed.codingBoost = true;
    if (item.effect.dateBoost) S.itemsUsed.dateBoost = true;
    if (item.effect.lucky) S.itemsUsed.lucky = true;
    applyEffects(item.effect);
  }
  return true;
}

function checkAchievements() {
  for (const ach of ACHIEVEMENTS) {
    if (!S.achievements.includes(ach.id) && ach.check(S)) {
      S.achievements.push(ach.id);
      const a = ACHIEVEMENTS.find(x => x.id === ach.id);
      S.narrative.push({ type: 'achievement', text: `🏆 成就解锁：${a.emoji} ${a.name} —— ${a.desc}` });
    }
  }
}

function startNewGame() {
  S = JSON.parse(JSON.stringify(DEFAULT_STATE));
  S.chars = {
    lin: { affection: 0, stage: 'stranger', met: false },
    su: { affection: 0, stage: 'stranger', met: false },
    lu: { affection: 0, stage: 'stranger', met: false },
    ye: { affection: 0, stage: 'stranger', met: false },
  };
  S.phase = 'playing';
  S.narrative = [{ type: 'system', text: '🌅 九月的武汉，热得像蒸笼。你拖着一个行李箱，站在华科南大门前。你是华中科技大学计算机学院的一名新生。接下来的四年，会发生什么呢？' }];
  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  renderGame();
}

function doAction(actionId) {
  if (S.phase !== 'playing') return;
  const action = BASE_ACTIONS.find(a => a.id === actionId);
  if (!action) return;

  // Check costs
  if (action.cost.energy && S.energy < action.cost.energy) {
    S.narrative.push({ type: 'error', text: '⚡ 精力不足！你需要休息一下。' });
    renderGame();
    return;
  }
  if (action.cost.money && S.money < action.cost.money) {
    S.narrative.push({ type: 'error', text: '💰 钱不够了！可以考虑做兼职或者省着点花。' });
    renderGame();
    return;
  }

  // Apply costs
  if (action.cost.energy) S.energy -= action.cost.energy;
  if (action.cost.money) S.money -= action.cost.money;

  // Apply boosts
  let eff = { ...action.eff };
  if (S.itemsUsed.codingBoost && action.cat === 'coding') {
    eff.coding = Math.floor((eff.coding || 0) * 1.5);
    S.itemsUsed.codingBoost = false;
    S.narrative.push({ type: 'system', text: '🎓 网课会员生效！编程力增长×1.5！' });
  }
  if (S.itemsUsed.dateBoost && action.cat === 'romance') {
    S.itemsUsed.dateBoost = false;
    S.narrative.push({ type: 'system', text: '🎬 电影票已使用！本次约会好感度+8！' });
  }

  applyEffects(eff);

  // Track streaks
  if (actionId === 'gym') S.gymStreak++; else S.gymStreak = 0;
  if (actionId === 'rest') S.restStreak++; else S.restStreak = 0;
  if (actionId === 'date') S.dateCount++;
  S.lastAction = actionId;

  // Character encounter
  if (action.char) {
    const c = S.chars[action.char];
    if (!c.met && S.semester >= 0) {
      c.met = true;
      c.affection = clamp(c.affection + 5, 0, 100);
      c.stage = getStage(c.affection);
      const cd = CHARACTERS[action.char];
      S.narrative.push({ type: 'event', text: cd.events.meet.text, char: action.char });
    } else if (c.met) {
      c.affection = clamp(c.affection + 3, 0, 100);
      c.stage = getStage(c.affection);
      if (Math.random() < 0.3) {
        const cd = CHARACTERS[action.char];
        S.narrative.push({ type: 'event', text: `你${action.name}时遇到了${cd.name}。她对你笑了笑。好感度+3。`, char: action.char });
      }
    }
  }

  // Narrative
  S.narrative.push({ type: 'action', text: `▶ 你选择了「${action.name}」——${action.desc}` });

  // Random mini-game trigger from actions
  if (actionId === 'date' && Math.random() < 0.3 && S.dateCount <= 2) {
    S.nextMinigame = 'typing';
  } else if (actionId === 'club' && Math.random() < 0.3) {
    S.nextMinigame = 'match';
  } else if (actionId === 'lab' && Math.random() < 0.25) {
    S.nextMinigame = 'debug';
  }

  // Advance week
  S.week++;
  if (S.week >= 4) {
    endSemester();
    return;
  }

  // Weekend random event
  triggerRandomEvent();
  if (S.nextMinigame) {
    const mg = S.nextMinigame;
    S.nextMinigame = null;
    startMinigame(mg);
    return;
  }
  checkAchievements();
  renderGame();
}

function triggerRandomEvent() {
  if (S.itemsUsed.lucky) {
    S.itemsUsed.lucky = false;
    const goodEvents = RANDOM_EVENTS.filter(e => e.flavor === 'good' && e.cond(S));
    if (goodEvents.length > 0) {
      const ev = pick(goodEvents);
      S.narrative.push({ type: 'event', text: '🍀 幸运符生效！' + ev.text });
      applyEffects(ev.eff);
      if (ev.minigame) { S.nextMinigame = ev.minigame; }
      if (ev.id === 'r25') S.canteenEvents++;
      return;
    }
  }

  const eligible = RANDOM_EVENTS.filter(e => e.cond(S));
  if (eligible.length === 0) return;
  const ev = pick(eligible);
  S.narrative.push({ type: 'event', text: ev.text });
  applyEffects(ev.eff);
  if (ev.id === 'r1') S.canteenEvents++;
  if (ev.minigame) { S.nextMinigame = ev.minigame; }
}

function endSemester() {
  // Exam
  const examScore = S.coding * 0.3 + S.gpa * 25 + randInt(30);
  let examText = '';
  if (examScore > 80) {
    examText = '📝 期末考试：你考得很好！GPA稳中有升。';
    S.gpa = clamp(S.gpa + 0.15, 0, 4.0);
  } else if (examScore > 50) {
    examText = '📝 期末考试：马马虎虎，及格万岁。';
    S.gpa = clamp(S.gpa + 0.05, 0, 4.0);
  } else {
    examText = '📝 期末考试：你挂了一科…GPA大幅下滑。';
    S.gpa = clamp(S.gpa - 0.3, 0, 4.0);
    S.failedExams++;
  }
  S.narrative.push({ type: 'exam', text: examText });

  // Semester-specific event
  const semEventText = SEM_EVENTS[S.semester];
  S.narrative.push({ type: 'system', text: `🎯 本学期大事件：${semEventText}` });

  // Trigger character key events
  for (const [cid, cdata] of Object.entries(CHARACTERS)) {
    const char = S.chars[cid];
    if (!char.met) continue;
    for (const [ekey, edata] of Object.entries(cdata.events)) {
      if (ekey === 'meet') continue;
      if (edata.sem === S.semester && char.affection >= edata.need && !S[`event_${cid}_${ekey}`]) {
        S[`event_${cid}_${ekey}`] = true;
        S.narrative.push({ type: 'keyevent', text: `⭐ ${cdata.name}关键事件：${edata.text}`, char: cid });
        char.affection = clamp(char.affection + 8, 0, 100);
        char.stage = getStage(char.affection);
      }
    }
  }

  // Trigger choice events
  for (const ce of CHOICE_EVENTS) {
    const char = S.chars[ce.char];
    if (!char || !char.met) continue;
    if (S.semester >= ce.semMin && char.affection >= ce.need && !S[`choice_${ce.id}`]) {
      S[`choice_${ce.id}`] = true;
      S.currentEvent = ce;
      S.phase = 'choice';
      renderChoice();
      return;
    }
  }

  // Next semester
  S.semester++;
  S.week = 0;
  S.energy = clamp(S.energy + 30, 0, 100);

  if (S.semester >= 7) {
    calculateEnding();
    return;
  }

  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  S.narrative.push({ type: 'system', text: '💡 新学期新气象。你想做点什么？' });

  // Trigger meet events for new semester
  if (S.semester === 1 && !S.chars.ye.met) {
    S.chars.ye.met = true;
    S.chars.ye.affection = 5;
    S.chars.ye.stage = getStage(S.chars.ye.affection);
    S.narrative.push({ type: 'event', text: CHARACTERS.ye.events.meet.text, char: 'ye' });
  }

  checkAchievements();
  renderGame();
}

function resolveChoice(choiceIdx) {
  const ce = S.currentEvent;
  if (!ce) return;
  const choice = ce.choices[choiceIdx];
  applyEffects(choice.eff, choice.affection || null);
  S.narrative.push({ type: 'choice', text: `💬 你选择了：「${choice.text}」` });

  // Check time master achievement
  if (S.dateCount >= 2 && S.week <= 3) S.timeMaster = true;

  S.currentEvent = null;
  S.phase = 'playing';

  // Continue semester progression
  S.semester++;
  S.week = 0;
  S.energy = clamp(S.energy + 30, 0, 100);

  if (S.semester >= 7) {
    calculateEnding();
    return;
  }

  S.narrative.push({ type: 'system', text: `📅 ${SEMESTERS[S.semester]} 开始了！主题：${SEM_EVENTS[S.semester]}` });
  checkAchievements();
  renderGame();
}

function confess(characterId) {
  if (S.phase !== 'playing') return;
  const char = S.chars[characterId];
  if (!char || !char.met) { S.narrative.push({ type: 'error', text: '你还不认识这个人。' }); renderGame(); return; }
  if (char.stage === '恋人') { S.narrative.push({ type: 'error', text: '你们已经是恋人了！' }); renderGame(); return; }
  if (S.confessedTo.includes(characterId)) { S.narrative.push({ type: 'error', text: '你已经表白过了，再表白就成骚扰了…' }); renderGame(); return; }

  S.confessedTo.push(characterId);
  const successChance = char.affection / 100 * 0.7 + S.romance / 100 * 0.2 + S.appearance / 100 * 0.1;

  if (char.stage === '暧昧' && successChance > 0.5) {
    char.affection = clamp(char.affection + 20, 0, 100);
    char.stage = '恋人';
    S.narrative.push({ type: 'confession', text: `💕 表白成功！${CHARACTERS[characterId].name}脸红了：「…我也喜欢你。」你们在一起了！`, char: characterId });
  } else if (char.stage === '朋友' && successChance > 0.65) {
    char.affection = clamp(char.affection + 15, 0, 100);
    char.stage = getStage(char.affection);
    S.narrative.push({ type: 'confession', text: `💕 表白成功！${CHARACTERS[characterId].name}有些惊讶，但还是点了点头。`, char: characterId });
  } else {
    S.rejected++;
    S.narrative.push({ type: 'confession', text: `💔 被发好人卡了…「你很好，但是…」${CHARACTERS[characterId].name}委婉地拒绝了你。`, char: characterId });
    char.affection = clamp(char.affection - 10, 0, 100);
    char.stage = getStage(char.affection);
  }
  checkAchievements();
  renderGame();
}

function calculateEnding() {
  S.phase = 'ending';
  // Career ending
  let careerEnding;
  if (S.coding >= 90 && S.gpa >= 3.5) careerEnding = { id: 'bytedance', text: '🏆 字节跳动 SSP offer！', desc: '你在秋招中大杀四方，拿下了字节跳动的Special Offer。年薪让全班同学都酸了。' };
  else if (S.coding >= 60) careerEnding = { id: 'midjob', text: '💼 中厂offer', desc: '你找到了一份不错的工作，虽然比不上大厂，但也能在光谷过得滋润。' };
  else if (S.gpa >= 3.8 && S.coding >= 70) careerEnding = { id: 'tsinghua', text: '🎓 保研清华！', desc: '你的GPA一路领跑，成功拿到了清华的保研名额。整个学院都在传你的名字。' };
  else if (S.gpa >= 3.0) careerEnding = { id: 'hustmaster', text: '🎓 保研本校', desc: '你选择留在华科继续读研。熟悉的环境，熟悉的人，也是一种幸福。' };
  else if (S.money >= 3000 && S.coding >= 60 && S.gpa < 2.5) careerEnding = { id: 'startup', text: '🚀 休学创业', desc: '你拉了几个同学在光谷租了个办公室，开始创业。投资人是个华科校友——他说他当年也在南一楼写过代码。' };
  else if (S.coding < 50 && S.gpa >= 2.5 && S.gpa <= 3.5 && S.social >= 60) careerEnding = { id: 'civil', text: '📜 考公上岸', desc: '你考上了公务员，过上了朝九晚五的生活。偶尔在朋友圈看到前同事的加班动态，你微微一笑。' };
  else if (S.gpa >= 3.5 && S.money >= 1500) careerEnding = { id: 'abroad', text: '🌍 出国留学', desc: '你申请到了美国CS名校的offer。在机场告别家人的时候，你发了一条朋友圈：「出发了，四年后再见。」' };
  else if (S.coding >= 85 && S.social < 30 && S.romance < 20) careerEnding = { id: 'indie', text: '👨‍💻 独立开发者', desc: '你成了一个独立开发者，做了一个小有名气的开源项目。GitHub上star数破了万，但你的微信置顶永远是技术群。' };
  else if (S.gpa < 1.8 && S.coding < 40) careerEnding = { id: 'delay', text: '💀 延毕', desc: '学分不够，你延毕了一年。但这一年里，你想清楚了很多事情——比如人生的意义不只有GPA。' };
  else careerEnding = { id: 'normal', text: '💼 普通offer', desc: '你找到了一份普通的工作。没什么特别的，但也没什么不好的。大多数人的故事，就是这样。' };

  // Love ending
  let loveEndings = [];
  for (const [cid, cdata] of Object.entries(CHARACTERS)) {
    const char = S.chars[cid];
    if (char.stage === '恋人') {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.love, tier: 'love' });
    } else if (char.affection >= 50) {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.ambiguous, tier: 'ambiguous' });
    } else if (char.affection >= 20) {
      loveEndings.push({ cid, name: cdata.name, emoji: cdata.emoji, text: cdata.endings.miss, tier: 'miss' });
    }
  }

  // Special endings
  const allLow = Object.values(S.chars).every(c => c.affection < 20);
  const allHigh = Object.values(S.chars).filter(c => c.affection >= 60).length >= 3;
  const loveCount = loveEndings.filter(l => l.tier === 'love').length;
  const codeLove = S.coding >= 95 && S.dateCount === 0 && allLow;

  S.ending = { career: careerEnding, love: loveEndings, allLow, allHigh, loveCount, codeLove };
  checkAchievements();
  renderEnding();
}

function renderGame() {
  S.phase = 'playing';

  // Build narrative HTML
  const recentNarr = S.narrative.slice(-8);
  let narrHTML = recentNarr.map(n => {
    let cls = '';
    if (n.type === 'error') cls = 'highlight';
    if (n.type === 'achievement') cls = 'name-tag';
    if (n.type === 'confession') cls = 'highlight';
    if (n.type === 'keyevent') cls = 'name-tag';
    return `<p class="${cls}">${n.text}</p>`;
  }).join('');

  // Stat bars
  const stats = [
    { label: '编程力', val: S.coding, cls: 'fill-coding' },
    { label: '社交力', val: S.social, cls: 'fill-social' },
    { label: '颜值',   val: S.appearance, cls: 'fill-appearance' },

    { label: 'GPA',    val: S.gpa, cls: 'fill-gpa', fmt: v => gpaText(v), max: 4.0 },
  ];
  let statsHTML = stats.map(s => {
    const pct = s.max ? (s.val / s.max * 100) : s.val;

    return html`
      <div class="stat-item">
        <div class="stat-label"><span>${s.label}</span><span>${display}</span></div>
        <div class="stat-bar-bg"><div class="stat-bar-fill ${s.cls}" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');

  // Character tags
  let charsHTML = Object.entries(CHARACTERS).map(([cid, cd]) => {
    const c = S.chars[cid];
    const pct = c.affection;
    return html`
      <div class="char-tag${c.met ? '' : ' locked'}">
        <div class="char-name">${cd.emoji} ${cd.name} <span class="char-stage">· ${c.met ? c.stage : '???'}</span></div>
        <div class="char-hearts">${c.met ? '💕'.repeat(Math.floor(c.affection / 20) + 1) : '🔒'}</div>
        <div class="char-bar-bg"><div class="char-bar-fill" style="width:${c.met ? pct : 0}%"></div></div>
      </div>
    `;
  }).join('');

  // Actions
  let actionsHTML = BASE_ACTIONS.map(a => {
    return html`<button class="btn" onclick="doAction('${a.id}')" title="${a.desc}">${a.icon} ${a.name}</button>`;
  }).join('');

  // Confess buttons
  let confessHTML = Object.entries(CHARACTERS).map(([cid, cd]) => {
    const c = S.chars[cid];

    return html`<button class="btn small" onclick="confess('${cid}')" ${S.confessedTo.includes(cid) ? 'disabled' : ''}>💌 向${cd.name}表白</button>`;
  }).filter(Boolean).join('');

  });
  shopHTML += `</div>`;

  app.innerHTML = html`
    <div class="card">
      <div class="game-title" style="font-size:1.4rem;">华科计院找爱情</div>
      <div class="top-bar">

      </div>

  // Auto-scroll narrative
  setTimeout(() => {
    const box = document.getElementById('narrativeBox');
    if (box) box.scrollTop = box.scrollHeight;
  }, 50);
}

function renderChoice() {

      ${achHTML}

      <div style="margin-top:20px;">
        <button class="btn primary" onclick="startNewGame()">🔄 再来一周目</button>
        <button class="btn" onclick="showAchievements()">🏆 全部成就</button>
        <button class="btn" onclick="S.phase='title';renderTitle()">🏠 主菜单</button>
      </div>
    </div>
  `;
}

function showAchievements() {
  let gridHTML = ACHIEVEMENTS.map(a => {
    const unlocked = S.achievements.includes(a.id);
    return html`<div class="ach-item${unlocked ? ' unlocked' : ''}">
      <span class="ach-icon">${unlocked ? a.emoji : '🔒'}</span>
      <div><div style="font-weight:600;">${a.name}</div><div style="font-size:0.7rem;">${a.desc}</div></div>
    </div>`;
  }).join('');

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">🏆 成就收藏</div>
        <div style="color:#888;font-size:0.8rem;margin-bottom:12px;">已解锁：${S.achievements.length} / ${ACHIEVEMENTS.length}</div>
        <div class="ach-grid">${gridHTML}</div>
        <div style="text-align:center;margin-top:16px;">
          <button class="btn primary" onclick="if(S.phase==='title')renderTitle();else if(S.phase==='ending')renderEnding();else renderGame();">返回</button>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// MINI GAMES (extra, triggered by events)
// ═══════════════════════════════════════════
function startMinigame(type) {
  if (type === 'debug') startDebugGame();
  else if (type === 'typing') startTypingGame();
  else if (type === 'match') startMatchGame();
}

function startDebugGame() {
  S.phase = 'minigame';
  const bugs = [
    { code: 'for(int i=0; i<n; i++);', line: 1, bug: 1, hint: '多余的分号' },
    { code: 'if (x = 5)', line: 2, bug: 2, hint: '赋值当判断' },
    { code: 'console.log("hello)', line: 3, bug: 3, hint: '缺少引号' },
  ];
  const target = pick(bugs);

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">🔧 Debug速修</div>
        <div style="color:#ccc;font-size:0.85rem;margin-bottom:12px;">找出代码中的bug！30秒倒计时</div>
        <div class="minigame-timer" id="debugTimer">⏱ 30s</div>
        <div style="margin:12px 0;">
          ${bugs.map((b, i) => html`
            <div class="minigame-target bug-btn" onclick="resolveDebug(${b.bug === target.bug})" id="bug${i}">
              ${b.code}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  let time = 30;
  window._debugInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('debugTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._debugInterval); resolveDebug(false); }
  }, 1000);
  window._debugTarget = target;
}

function resolveDebug(success) {
  clearInterval(window._debugInterval);
  if (success) {
    S.coding = clamp(S.coding + 8, 0, 100);
    S.narrative.push({ type: 'event', text: '✅ Debug成功！你精准地找到了bug。编程力+8！' });
  } else {
    S.narrative.push({ type: 'event', text: '❌ Debug失败…但没关系，bug就是程序员最好的老师。' });
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}

function startTypingGame() {
  S.phase = 'minigame';
  const phrases = ['hello world', 'i love code', 'debug me', 'git push', '404 not found', 'while true', 'return 0'];
  const target = pick(phrases);
  window._typingTarget = target;

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">⌨️ 心动打字</div>
        <div style="color:#ccc;font-size:0.85rem;margin-bottom:12px;">快速打出下面的文字！</div>
        <div class="minigame-timer" id="typeTimer">⏱ 20s</div>
        <div class="minigame-target" style="font-size:1.4rem;text-align:center;letter-spacing:2px;">${target}</div>
        <input id="typeInput" style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0a0a14;color:#fff;font-size:1rem;text-align:center;margin-top:12px;font-family:inherit;" autofocus>
      </div>
    </div>
  `;

  let time = 20;
  window._typeInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('typeTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._typeInterval); resolveTyping(false); }
  }, 1000);

  setTimeout(() => {
    const inp = document.getElementById('typeInput');
    if (inp) {
      inp.addEventListener('input', function() {
        if (this.value.toLowerCase().trim() === window._typingTarget) {
          resolveTyping(true);
        }
      });
      inp.focus();
    }
  }, 100);
}

function resolveTyping(success) {
  clearInterval(window._typeInterval);
  if (success) {
    S.romance = clamp(S.romance + 8, 0, 100);
    S.narrative.push({ type: 'event', text: '⌨️ 打字飞起！你的手速让对方印象深刻。浪漫值+8！' });
  } else {
    S.narrative.push({ type: 'event', text: '⌨️ 打字超时…下次约会前记得多练练。' });
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}

function startMatchGame() {
  S.phase = 'minigame';
  const emojis = ['💻', '☕', '📚', '💕', '🎮', '🍜'];
  const cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  window._matchCards = cards;
  window._matchFlipped = [];
  window._matchMatched = [];
  window._matchLocked = false;

  let cardsHTML = cards.map((e, i) => html`
    <div class="bug-btn" id="card${i}" onclick="flipCard(${i})" style="width:50px;height:50px;display:inline-flex;align-items:center;justify-content:center;font-size:1.3rem;">❓</div>
  `).join('');

  app.innerHTML = html`
    <div class="overlay">
      <div class="overlay-card">
        <div class="overlay-title">🃏 缘分匹配</div>
        <div style="color:#ccc;font-size:0.85rem;margin-bottom:12px;">翻牌配对，全部配对成功即可！</div>
        <div class="minigame-timer" id="matchTimer">⏱ 25s</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:260px;margin:12px auto;">${cardsHTML}</div>
      </div>
    </div>
  `;

  let time = 25;
  window._matchInterval = setInterval(() => {
    time--;
    const timerEl = document.getElementById('matchTimer');
    if (timerEl) timerEl.textContent = `⏱ ${time}s`;
    if (time <= 0) { clearInterval(window._matchInterval); resolveMatch(false); }
  }, 1000);
}

function flipCard(idx) {
  if (window._matchLocked) return;
  if (window._matchFlipped.includes(idx)) return;
  if (window._matchMatched.includes(idx)) return;

  window._matchFlipped.push(idx);
  const el = document.getElementById('card' + idx);
  if (el) el.textContent = window._matchCards[idx];

  if (window._matchFlipped.length === 2) {
    window._matchLocked = true;
    const [a, b] = window._matchFlipped;
    if (window._matchCards[a] === window._matchCards[b]) {
      window._matchMatched.push(a, b);
      window._matchFlipped = [];
      window._matchLocked = false;
      if (window._matchMatched.length === window._matchCards.length) {
        resolveMatch(true);
      }
    } else {
      setTimeout(() => {
        document.getElementById('card' + a).textContent = '❓';
        document.getElementById('card' + b).textContent = '❓';
        window._matchFlipped = [];
        window._matchLocked = false;
      }, 500);
    }
  }
}

function resolveMatch(success) {
  clearInterval(window._matchInterval);
  if (success) {
    S.social = clamp(S.social + 8, 0, 100);
    S.narrative.push({ type: 'event', text: '🃏 全部配对成功！你在联谊活动上大放异彩。社交力+8！' });
  } else {
    S.narrative.push({ type: 'event', text: '🃏 配对失败…联谊活动上你有点紧张。' });
  }
  S.phase = 'playing';
  checkAchievements();
  renderGame();
}

// ═══════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════
function saveGame() {
  const saveData = {
    ...S,
    currentEvent: null, // Don't save event reference
  };
  try {
    localStorage.setItem('hust_cs_love_save', JSON.stringify(saveData));
    S.narrative.push({ type: 'system', text: '💾 游戏已保存！' });
  } catch(e) {
    S.narrative.push({ type: 'error', text: '保存失败…' });
  }
  renderGame();
}

function loadGame() {
  try {
    const raw = localStorage.getItem('hust_cs_love_save');
    if (!raw) { alert('没有找到存档。'); return; }
    const data = JSON.parse(raw);
    S = data;
    // Restore character methods
    for (const cid of Object.keys(CHARACTERS)) {
      if (!S.chars[cid]) S.chars[cid] = { affection: 0, stage: 'stranger', met: false };
    }
    S.currentEvent = null;
    S.nextMinigame = null;
    S.itemsUsed = S.itemsUsed || {};
    if (S.phase === 'choice') S.phase = 'playing';
    S.narrative.push({ type: 'system', text: '💾 存档已加载。欢迎回来！' });
    if (S.phase === 'ending') renderEnding();
    else renderGame();
  } catch(e) {
    alert('存档损坏，无法读取。');
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderTitle();
</script>
</body>
</html>
